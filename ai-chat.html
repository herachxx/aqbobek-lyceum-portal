<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini AI Chat</title>
<style>
  #chat { border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll; }
  .user { color: blue; }
  .ai { color: green; }
</style>
</head>
<body>
<h1>Mini AI Chat</h1>
<div id="chat"></div>
<input type="text" id="message" placeholder="Напиши сообщение">
<button id="sendBtn">Отправить</button>

<script>
    const chatDiv = document.getElementById("chat");
const input = document.getElementById("message");
const btn = document.getElementById("sendBtn");

// URL webhook из n8n (используйте Production URL для постоянной работы)
const WEBHOOK_URL = "https://asicapital.asia/webhook/123ed4d4-2837-49a4-b35d-92d57dce41ad"; 

btn.addEventListener("click", async () => {
    const text = input.value.trim();
    if (!text) return; 

    // 1. Отображаем сообщение пользователя 
    const pUser = document.createElement("p"); 
    pUser.textContent = "Вы: " + text;
    pUser.className = "user";
    chatDiv.appendChild(pUser);
    input.value = ""; 

    try {
        // 2. Отправка запроса в n8n
        const res = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: text })
        });

        if (!res.ok) throw new Error("Ошибка сервера");

        // 3. Получаем JSON и достаем только текст из output
        const data = await res.json();
        
        // n8n может вернуть массив [ { output: "..." } ] или просто объект { output: "..." }
        let aiRawText = Array.isArray(data) ? data[0].output : data.output;

        // 4. Очистка от возможных артефактов и замена \n на HTML-переносы
        const cleanText = aiRawText.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");

        // 5. Вывод ответа ИИ
        const pAI = document.createElement("p");
        pAI.className = "ai";
        pAI.innerHTML = "ИИ: " + cleanText; // Используем innerHTML для обработки <br>
        
        chatDiv.appendChild(pAI);
        
        // Автопрокрутка вниз
        chatDiv.scrollTop = chatDiv.scrollHeight;

    } catch (err) {
        console.error("Ошибка:", err);
        const pErr = document.createElement("p");
        pErr.textContent = "ИИ: Ошибка соединения с сервером.";
        pErr.style.color = "red";
        chatDiv.appendChild(pErr);
    }
});
</script>
</body>
</html>
