<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценки ученика</title>
    <link rel="stylesheet" href="css/main_style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .grades-wrapper {
            background: white;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 900px;
            padding: 24px;
        }
        .grades-wrapper h1 {
            margin-bottom: 14px;
            font-size: 24px;
            color: #2f2f2f;
        }
        .grades-wrapper table {
            width: 100%;
            border-collapse: collapse;
            max-width: 100%;
        }
        .grades-wrapper th,
        .grades-wrapper td {
            border: 1px solid #eee;
            padding: 12px 10px;
            text-align: left;
            color: #333;
        }
        .grades-wrapper th {
            background: #f5f7ff;
            font-weight: 700;
        }
        .no-data {
            text-align: center;
            color: #7a7a7a;
            margin-top: 12px;
        }
        .back-btn {
            margin-top: 12px;
            display: inline-block;
            background: #667eea;
            color: #fff;
            border: 0;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="grades-wrapper">
        <h1>Оценки</h1>
        <div id="info"></div>
        <table id="gradesTable" style="display:none;">
            <thead>
                <tr><th>Предмет</th><th>Оценка</th></tr>
            </thead>
            <tbody id="gradesBody"></tbody>
        </table>
        <p class="no-data" id="noGrades"></p>
        <a class="back-btn" href="a1s-layout.html">Вернуться</a>
    </div>

    <script>
        const infoEl = document.getElementById('info');
        const gradesTable = document.getElementById('gradesTable');
        const gradesBody = document.getElementById('gradesBody');
        const noGradesEl = document.getElementById('noGrades');

        function showMessage(txt, isError = false) {
            infoEl.textContent = txt;
            infoEl.style.color = isError ? '#d32f2f' : '#2d2d72';
        }

        async function loadGrades() {
            try {
                const response = await fetch('json/student_grades.json');
                return await response.json();
            } catch (error) {
                showMessage('Ошибка при загрузке данных оценок', true);
                return null;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const currentUserRaw = sessionStorage.getItem('currentUser');
            if (!currentUserRaw) {
                showMessage('Сначала войдите на сайте.', true);
                noGradesEl.textContent = 'Данные отсутствуют, пожалуйста, выполните вход.';
                return;
            }

            const user = JSON.parse(currentUserRaw);
            showMessage(`Пользователь: ${user.fullname || user.login}`);

            const gradesData = await loadGrades();
            if (!gradesData) {
                noGradesEl.textContent = 'Невозможно загрузить оценки.';
                return;
            }

            const student = gradesData.find(r => r.fullname === user.fullname || r.login === user.login);
            if (!student) {
                noGradesEl.textContent = 'Оценки для текущего пользователя не найдены.';
                return;
            }

            Object.entries(student.grades || {}).forEach(([subject, grade]) => {
                const tr = document.createElement('tr');
                const tdSubject = document.createElement('td');
                tdSubject.textContent = subject;
                const tdGrade = document.createElement('td');
                tdGrade.textContent = grade;
                tr.appendChild(tdSubject);
                tr.appendChild(tdGrade);
                gradesBody.appendChild(tr);
            });

            if (gradesBody.children.length === 0) {
                noGradesEl.textContent = 'Оценок нет.';
            } else {
                gradesTable.style.display = 'table';
            }
        });
    </script>
</body>
</html>
