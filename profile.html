<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль ученика</title>
    <link rel="stylesheet" href="css/main_style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .profile-card {
            width: 100%;
            max-width: 760px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 14px 35px rgba(0,0,0,.18);
            overflow: hidden;
        }
        .profile-banner {
            height: 180px;
            background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            position: relative;
        }
        .profile-avatar {
            position: absolute;
            left: 402px;
            bottom: 490px;
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,.25);
            background: #fff;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-content {
            padding: 66px 26px 24px;
        }
        .profile-name {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: #2d2d72;
        }
        .profile-subtitle {
            margin: 6px 0 18px;
            color: #777;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2,minmax(0,1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .info-card {
            border: 1px solid #eff1ff;
            border-radius: 10px;
            padding: 12px 14px;
            background: #fbfbff;
        }
        .info-card strong {
            display: block;
            margin-bottom: 5px;
            color: #444;
        }
        .action-btns {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .action-btns a {
            background: linear-gradient(135deg,#667eea,#764ba2);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform .2s, box-shadow .2s;
        }
        .action-btns a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,.2);
        }
        .no-data {
            color: #ca2a2a;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="profile-banner"></div>
        <div class="profile-avatar"><img id="avatarImg" src="https://www.w3schools.com/howto/img_avatar.png" alt="Avatar"></div>
        <div class="profile-content">
            <h1 class="profile-name" id="profileName">Гость</h1>
            <p class="profile-subtitle" id="profileLogin">@guest</p>
            <div class="info-grid">
                <div class="info-card"><strong>ID</strong><span id="profileId">—</span></div>
                <div class="info-card"><strong>Статус</strong><span id="profileStatus">Гостевой доступ</span></div>
                <div class="info-card"><strong>Оценки</strong><span id="profileGrades">—</span></div>
                <div class="info-card"><strong>Достижения</strong><span id="profileAchievements">—</span></div>
            </div>
            <div class="action-btns">
                <a href="grades.html">Посмотреть оценки</a>
                <a href="achievements.html">Посмотреть достижения</a>
                <a href="a1s-layout.html">На главную</a>
            </div>
            <p id="error" class="no-data"></p>
        </div>
    </div>

    <script>
        async function fetchJSON(url) {
            try {
                const res = await fetch(url);
                return await res.json();
            } catch (err) {
                console.error(url, err);
                return null;
            }
        }

        function renderProfile(user) {
            document.getElementById('profileName').textContent = user.fullname || user.login || 'Гость';
            document.getElementById('profileLogin').textContent = '@' + (user.login || 'guest');
            document.getElementById('profileId').textContent = user.id || '—';
            document.getElementById('avatarImg').src = 'https://www.w3schools.com/howto/img_avatar2.png';

            return Promise.all([fetchJSON('json/student_grades.json'), fetchJSON('json/student_info.json')]);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const currentUserRaw = sessionStorage.getItem('currentUser');
            if (!currentUserRaw) {
                document.getElementById('error').textContent = 'Пожалуйста, сначала войдите через вход на главной.';
                return;
            }

            const user = JSON.parse(currentUserRaw);
            const [gradesData, infoData] = await renderProfile(user);

            if (!gradesData || !infoData) {
                document.getElementById('error').textContent = 'Не удалось загрузить данные. Попробуйте перезагрузить страницу.';
                return;
            }

            const gradesUser = gradesData.find(u => u.fullname === user.fullname || u.login === user.login);
            const infoUser = infoData.find(u => u.fullname === user.fullname || u.login === user.login);

            if (gradesUser && gradesUser.grades) {
                const avg = Object.values(gradesUser.grades).reduce((a,v)=>a+v,0)/Object.keys(gradesUser.grades).length;
                document.getElementById('profileGrades').textContent = `Средний балл: ${avg.toFixed(1)}`;
            } else {
                document.getElementById('profileGrades').textContent = 'Данные отсутствуют';
            }

            if (infoUser && Array.isArray(infoUser.achievements) && infoUser.achievements.length) {
                document.getElementById('profileAchievements').textContent = infoUser.achievements.length + ' достижений';
            } else {
                document.getElementById('profileAchievements').textContent = 'Данные отсутствуют';
            }

            if (!gradesUser && !infoUser) {
                document.getElementById('error').textContent = 'Данные для текущего пользователя не найдены.';
            }
        });
    </script>
</body>
</html>
