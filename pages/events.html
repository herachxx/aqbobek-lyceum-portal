<!DOCTYPE html>
<html lang="kk">
<head>
    <link rel="icon" type="image/png" href="../website-icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Іс-шаралар - Aqbobek Lyceum</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" class="btn btn-ghost btn-sm" id="mobileMenuBtn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
      <div class="topbar-title" id="topbarTitleEl">Іс-шаралар</div>
      <div class="topbar-actions">
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </div>
    <div class="page-content">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap" id="filterRow">
        <span style="font-size:13px;color:var(--gray);font-weight:600;">Фильтр:</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;" id="eventsGrid"></div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
(async () => {
  await initData();
  const user = Auth.require();
  buildSidebar('events', user.role);
  document.getElementById('topbarAvatar').textContent = initials(user.fullname || user.login);
  document.getElementById('topbarTitleEl').innerHTML = ICONS.calendar + ' Іс-шаралар';
  const types = ['all','academic','science','it','sport','general'];
  const typeLabels = {all:'Барлығы',academic:'Академиялық',science:'Ғылым',it:'IT',sport:'Спорт',general:'Жалпы'};
  let activeType = 'all';
  const filterRow = document.getElementById('filterRow');
  types.forEach(t => {
    const btn = document.createElement('button');
    btn.className = `btn btn-sm ${t === 'all' ? 'btn-primary' : 'btn-outline'}`;
    btn.textContent = typeLabels[t];
    btn.onclick = () => {
      activeType = t;
      document.querySelectorAll('#filterRow .btn').forEach(b => { b.className = 'btn btn-sm btn-outline'; });
      btn.className = 'btn btn-sm btn-primary';
      renderEvents();
    };
    filterRow.appendChild(btn);
  });
  function renderEvents() {
    const grid = document.getElementById('eventsGrid');
    const filtered = activeType === 'all' ? LYCEUM_DATA.events : LYCEUM_DATA.events.filter(e => e.type === activeType);
    grid.innerHTML = filtered.map(ev => `
      <div class="event-card card-hover">
        <div class="event-color-bar" style="background:${ev.color}"></div>
        <div class="event-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div class="event-type" style="color:${ev.color}">
              ${({academic:'Академиялық',science:'Ғылым',it:'IT',sport:'Спорт',general:'Жалпы'})[ev.type]}
            </div>
          </div>
          <div class="event-title">${ev.title}</div>
          <div class="event-desc">${ev.description}</div>
          <div class="event-meta">
            <div class="event-date">${ICONS.calendar} ${formatDateRu(ev.date)}</div>
            <span class="badge badge-purple">${ICONS.users} ${ev.participants} адам</span>
          </div>
          <button class="btn btn-outline btn-sm w-full" style="margin-top:12px" onclick="registerEvent('${ev.id}')">Тіркелу</button>
        </div>
      </div>
    `).join('');
  }
  function registerEvent(id) {
    const ev = LYCEUM_DATA.events.find(e => String(e.id) === String(id));
    toast(`"${ev.title}" іс-шарасына тіркелдіңіз!`, 'success');
  }
  renderEvents();
})();
</script>
</body>
</html>
