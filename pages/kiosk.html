<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk Mode — Ақбөбек Portal</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { overflow:hidden; margin:0; }
    .kiosk-screen { animation: fadeIn 1s ease; }
    .scroll-container { position:relative; overflow:hidden; }
    .scroll-inner {
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    /* Ticker tape */
    .ticker-wrapper { overflow: hidden; }
    .ticker-inner {
      display: inline-flex;
      gap: 80px;
      animation: tickerAnim 40s linear infinite;
      white-space: nowrap;
    }
    @keyframes tickerAnim {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    /* Auto scroll news */
    .news-scroll-wrap { overflow: hidden; height: calc(100vh - 260px); }
    .news-scroll-inner { animation: newsScroll 35s linear infinite; }
    @keyframes newsScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
    .news-scroll-inner:hover { animation-play-state: paused; }
    .kiosk-exit-btn {
      position:fixed; top:16px; right:16px; z-index:999;
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
      color:rgba(255,255,255,0.5); padding:6px 14px; border-radius:8px;
      font-family:var(--font); font-size:12px; cursor:pointer; transition:all 0.2s;
    }
    .kiosk-exit-btn:hover { background:rgba(255,255,255,0.2); color:#fff; }
  </style>
</head>
<body class="kiosk-mode">

<button class="kiosk-exit-btn" onclick="window.history.back()">✕ Жабу</button>

<div class="kiosk-screen">
  <!-- Header -->
  <div class="kiosk-header">
    <div class="kiosk-logo">
      <img src="https://a1s.kz/Logo_Lyc.png" alt="" style="width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.1);object-fit:cover;" onerror="this.style.display='none'">
      <div class="kiosk-logo-text">
        <strong>Ақбөбек Лицейі</strong>
        <span>IT бағыты · Ақтөбе · Unified Portal</span>
      </div>
    </div>
    <div class="kiosk-time">
      <div class="time" id="kioskTime">00:00</div>
      <div class="date" id="kioskDate"></div>
    </div>
  </div>

  <!-- Body -->
  <div class="kiosk-body">
    <!-- Main: News feed -->
    <div class="kiosk-main">
      <div class="kiosk-section-title">📰 ЖАҢАЛЫҚТАР ЖӘНЕ ІС-ШАРАЛАР</div>
      <div class="news-scroll-wrap">
        <div class="news-scroll-inner" id="newsScrollInner"></div>
      </div>
    </div>

    <!-- Sidebar: Leaderboard + Events -->
    <div class="kiosk-sidebar-panel">
      <div class="kiosk-section-title">🏆 ҮЗДІК ОҚУШЫЛАР</div>
      <div id="kioskLeaderboard"></div>

      <div class="kiosk-section-title" style="margin-top:24px">📅 ЖАҚЫН ІС-ШАРАЛАР</div>
      <div id="kioskEvents"></div>

      <div class="kiosk-section-title" style="margin-top:24px">🥇 ЖАҢА ЖЕТІСТІКТЕР</div>
      <div id="kioskAchievements"></div>
    </div>
  </div>

  <!-- Ticker -->
  <div class="kiosk-ticker">
    <div class="kiosk-ticker-label">🔴 ӨЗЕКТІ</div>
    <div class="ticker-wrapper" style="flex:1;overflow:hidden;">
      <div class="ticker-inner" id="tickerContent"></div>
    </div>
  </div>
</div>

<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('kioskTime').textContent = now.toLocaleTimeString('kk-KZ', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('kioskDate').textContent = now.toLocaleDateString('kk-KZ', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

// News scroll
const newsInner = document.getElementById('newsScrollInner');
const allItems = [
  ...LYCEUM_DATA.news.map(n => ({
    type: 'news',
    title: n.title,
    body: n.body,
    meta: formatDateRu(n.date),
    hot: n.hot,
    color: n.hot ? '#c084fc' : 'rgba(255,255,255,0.4)',
  })),
  ...LYCEUM_DATA.events.map(e => ({
    type: 'event',
    title: e.title,
    body: e.description,
    meta: `📅 ${formatDateRu(e.date)} · 👥 ${e.participants} адам`,
    hot: false,
    color: e.color,
  })),
];

// Double for seamless loop
const doubled = [...allItems, ...allItems];
doubled.forEach(item => {
  newsInner.innerHTML += `
    <div class="kiosk-news-card" style="border-left:3px solid ${item.color};">
      ${item.hot ? '<div style="font-size:11px;color:var(--accent);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">🔥 ҮЗДІК ЖАҢАЛЫҚ</div>' : ''}
      <div class="kiosk-news-title">${item.title}</div>
      <div class="kiosk-news-body">${item.body}</div>
      <div class="kiosk-news-date">${item.meta}</div>
    </div>
  `;
});

// Set animation duration
newsInner.style.animationDuration = `${allItems.length * 5}s`;

// Leaderboard
const lbDiv = document.getElementById('kioskLeaderboard');
LYCEUM_DATA.leaderboard.slice(0, 5).forEach(e => {
  lbDiv.innerHTML += renderLeaderboardRow(e, true);
});

// Events
const evDiv = document.getElementById('kioskEvents');
LYCEUM_DATA.events.slice(0, 3).forEach(e => {
  evDiv.innerHTML += `
    <div class="kiosk-event-card" style="border-left:3px solid ${e.color}">
      <div class="kiosk-event-title">${e.title}</div>
      <div class="kiosk-event-date">📅 ${formatDateRu(e.date)}</div>
    </div>
  `;
});

// Achievements
const achDiv = document.getElementById('kioskAchievements');
const allAchs = LYCEUM_DATA.students.flatMap(s =>
  (s.achievements || []).map(a => ({ ...a, studentName: s.fullname.split(' ').slice(0,2).join(' '), grade: s.grade }))
).slice(0, 4);

allAchs.forEach(a => {
  achDiv.innerHTML += `
    <div class="kiosk-achievement-badge">
      <div class="kiosk-ach-emoji">${a.icon}</div>
      <div class="kiosk-ach-info">
        <strong>${a.studentName}</strong>
        <span>${a.title.length > 28 ? a.title.slice(0,28)+'…' : a.title} · ${a.year}</span>
      </div>
    </div>
  `;
});

// Ticker content
const tickerDiv = document.getElementById('tickerContent');
const tickerItems = [
  ...LYCEUM_DATA.leaderboard.slice(0,3).map(e => `🥇 ${e.name} — GPA ${e.gpa}`),
  ...LYCEUM_DATA.events.map(e => `📅 ${e.title} — ${formatDateRu(e.date)}`),
  ...LYCEUM_DATA.news.map(n => `📰 ${n.title}`),
  'Ақбөбек лицейі — Батыс Қазақстанның үздік IT мектебі',
  '📞 +7(778) 680 0636 · a1s.kz',
];
const tickerContent = [...tickerItems, ...tickerItems].map(t => `<span class="kiosk-ticker-item">◆ ${t}</span>`).join('');
tickerDiv.innerHTML = tickerContent;
</script>
</body>
</html>
