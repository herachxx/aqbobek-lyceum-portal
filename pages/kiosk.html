<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk Mode - Aqbobek Lyceum</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      overflow: hidden;
      margin: 0;
    }
    .kiosk-screen {
      animation: fadeIn 1s ease;
    }
    .scroll-container {
      position: relative;
      overflow: hidden;
    }
    .scroll-inner {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .ticker-wrapper {
      overflow: hidden;
    }
    .ticker-inner {
      display: inline-flex;
      gap: 80px;
      animation: tickerAnim 40s linear infinite;
      white-space: nowrap;
    }
    @keyframes tickerAnim {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }
    .news-scroll-wrap {
      overflow: hidden;
      height: calc(100vh - 260px);
    }
    .news-scroll-inner {
      animation: newsScroll 35s linear infinite;
    }
    @keyframes newsScroll {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-50%);
      }
    }
    .news-scroll-inner:hover {
      animation-play-state: paused;
    }
    .kiosk-exit-btn {
      position: fixed;
      bottom: 72px;
      right: 20px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.5);
      padding: 6px 14px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kiosk-exit-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }
    .kiosk-exit-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }
  </style>
</head>
<body class="kiosk-mode">
  <a href="../index.html"><button class="kiosk-exit-btn" onclick="window.history.back()"><svg
        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>Жабу</button></a>
  <div class="kiosk-screen">
    <div class="kiosk-header">
      <div class="kiosk-logo">
        <img src="https://a1s.kz/Logo_Lyc.png" alt=""
          style="width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.06);object-fit:cover;"
          onerror="this.style.display='none'">
        <div class="kiosk-logo-text">
          <strong>Aqbobek Lyceum</strong>
          <span>   IT бағыты · Ақтөбе · Unified Portal</span>
        </div>
      </div>
      <div class="kiosk-time">
        <div class="time" id="kioskTime">00:00</div>
        <div class="date" id="kioskDate"></div>
      </div>
    </div>
    <div class="kiosk-body">
      <div class="kiosk-main">
        <div class="kiosk-section-title" id="newsSectionTitle">ЖАҢАЛЫҚТАР ЖӘНЕ ІС-ШАРАЛАР</div>
        <div class="news-scroll-wrap">
          <div class="news-scroll-inner" id="newsScrollInner"></div>
        </div>
      </div>
      <div class="kiosk-sidebar-panel">
        <div class="kiosk-section-title" id="lbSectionTitle">ҮЗДІК ОҚУШЫЛАР</div>
        <div id="kioskLeaderboard"></div>
        <div class="kiosk-section-title" style="margin-top:24px" id="evSectionTitle">ЖАҚЫН ІС-ШАРАЛАР</div>
        <div id="kioskEvents"></div>
        <div class="kiosk-section-title" style="margin-top:24px" id="achSectionTitle">ЖАҢА ЖЕТІСТІКТЕР</div>
        <div id="kioskAchievements"></div>
      </div>
    </div>
    <div class="kiosk-ticker">
      <div class="kiosk-ticker-label" id="tickerLabel">ӨЗЕКТІ</div>
      <div class="ticker-wrapper" style="flex:1;overflow:hidden;">
        <div class="ticker-inner" id="tickerContent"></div>
      </div>
    </div>
  </div>
  <script src="../json/decoder.js"></script>
  <script src="../json/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    (async () => {
      await initData();
      document.getElementById('newsSectionTitle').innerHTML = ICONS.newspaper + ' ЖАҢАЛЫҚТАР ЖӘНЕ ІС-ШАРАЛАР';
      document.getElementById('lbSectionTitle').innerHTML = ICONS.trophy + ' ҮЗДІК ОҚУШЫЛАР';
      document.getElementById('evSectionTitle').innerHTML = ICONS.calendar + ' ЖАҚЫН ІС-ШАРАЛАР';
      document.getElementById('achSectionTitle').innerHTML = ICONS.medal + ' ЖАҢА ЖЕТІСТІКТЕР';
      document.getElementById('tickerLabel').innerHTML = ICONS.circleAlert + ' ӨЗЕКТІ';
      function updateClock() {
        const now = new Date();
        document.getElementById('kioskTime').textContent =
          now.toLocaleTimeString('kk-KZ', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('kioskDate').textContent =
          now.toLocaleDateString('kk-KZ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      }
      setInterval(updateClock, 1000);
      updateClock();
      const newsInner = document.getElementById('newsScrollInner');
      const allItems = [
        ...(LYCEUM_DATA.news || []).map(n => ({
          type: 'news', title: n.title, body: n.body,
          meta: formatDateRu(n.date), hot: n.hot,
          color: n.hot ? 'var(--accent)' : 'rgba(255,255,255,0.3)',
        })),
        ...(LYCEUM_DATA.events || []).map(e => ({
          type: 'event', title: e.title, body: e.description,
          meta: formatDateRu(e.date) + ' · ' + e.participants + ' адам',
          hot: false, color: e.color,
        })),
      ];
      const doubled = [...allItems, ...allItems];
      doubled.forEach(item => {
        newsInner.innerHTML += `
      <div class="kiosk-news-card" style="border-left:3px solid ${item.color};">
        ${item.hot ? '<div style="font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:4px;">' + ICONS.flame + ' ҮЗДІК ЖАҢАЛЫҚ</div>' : ''}
        <div class="kiosk-news-title">${item.title}</div>
        <div class="kiosk-news-body">${item.body}</div>
        <div class="kiosk-news-date">${item.meta}</div>
      </div>
    `;
      });
      newsInner.style.animationDuration = `${allItems.length * 5}s`;
      const lbDiv = document.getElementById('kioskLeaderboard');
      (LYCEUM_DATA.leaderboard || []).slice(0, 5).forEach(e => {
        lbDiv.innerHTML += renderLeaderboardRow(e, true);
      });
      const evDiv = document.getElementById('kioskEvents');
      (LYCEUM_DATA.events || []).slice(0, 3).forEach(e => {
        evDiv.innerHTML += `
      <div class="kiosk-event-card" style="border-left:3px solid ${e.color}">
        <div class="kiosk-event-title">${e.title}</div>
        <div class="kiosk-event-date">${ICONS.calendar} ${formatDateRu(e.date)}</div>
      </div>
    `;
      });
      const achDiv = document.getElementById('kioskAchievements');
      const allAchs = (LYCEUM_DATA.students || []).flatMap(s =>
        (s.achievements || []).map(a => ({
          ...a,
          studentName: s.fullname.split(' ').slice(0, 2).join(' '),
          grade: s.grade
        }))
      ).slice(0, 4);
      allAchs.forEach(a => {
        achDiv.innerHTML += `
      <div class="kiosk-achievement-badge">
        <div class="kiosk-ach-emoji">${ICONS.trophy}</div>
        <div class="kiosk-ach-info">
          <strong>${a.studentName}</strong>
          <span>${a.title.length > 28 ? a.title.slice(0, 28) + '…' : a.title} · ${a.year}</span>
        </div>
      </div>
    `;
      });
      const tickerDiv = document.getElementById('tickerContent');
      const tickerItems = [
        ...(LYCEUM_DATA.leaderboard || []).slice(0, 3).map(e => `${e.name} - GPA ${e.gpa}`),
        ...(LYCEUM_DATA.events || []).map(e => `${e.title} - ${formatDateRu(e.date)}`),
        ...(LYCEUM_DATA.news || []).map(n => n.title),
        'Ақбөбек лицейі - Батыс Қазақстанның үздік IT мектебі',
        '+7(778) 680 0636 · a1s.kz',
      ];
      tickerDiv.innerHTML = [...tickerItems, ...tickerItems]
        .map(t => `<span class="kiosk-ticker-item">◆ ${t}</span>`)
        .join('');
    })();
  </script>
</body>
</html>
