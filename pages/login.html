<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кіру - Aqbobek Lyceum</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .login-card { max-width: 460px; }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .ico {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      pointer-events: none; user-select: none; color: var(--gray);
      display: flex; align-items: center;
    }
    .input-icon-wrap .ico svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .input-icon-wrap input { padding-left: 40px !important; }
    .input-icon-wrap .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--gray); padding: 4px; line-height: 1; display: flex; align-items: center;
    }
    .input-icon-wrap .eye-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .input-icon-wrap .eye-btn:hover { color: var(--p1); }
    .auth-toggle {
      display: flex; background: var(--cream); border-radius: 10px;
      padding: 4px; gap: 4px; margin-bottom: 22px;
    }
    .auth-toggle-btn {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--gray); cursor: pointer; transition: all 0.15s;
      background: transparent; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .auth-toggle-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .auth-toggle-btn.active {
      background: #fff; color: var(--p1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0; color: var(--gray); font-size: 12px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .btn-spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .shake { animation: shake .35s ease; }
    .form-mode-toggle {
      display: flex; background: var(--cream); border-radius: 10px;
      padding: 4px; gap: 4px; margin-bottom: 20px;
    }
    .form-mode-btn {
      flex: 1; padding: 9px; border: none; border-radius: 8px;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--gray); cursor: pointer; transition: all 0.15s;
      background: transparent; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .form-mode-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .form-mode-btn.active {
      background: #fff; color: var(--p1);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .reg-only { display: none; }
    .reg-only.visible { display: block; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <img src="https://a1s.kz/Logo_Lyc.png" alt="" style="width:32px;height:32px;object-fit:cover;border-radius:6px;" onerror="this.style.display='none'">
      </div>
      <div class="login-logo-text">
        <strong>Ақбөбек Portal</strong>
        <span>Unified School System</span>
      </div>
    </div>
    <h2 class="login-title">Қош келдіңіз!</h2>
    <p class="login-sub" id="loginSub">Аккаунтыңызға кіріңіз</p>
    <div class="auth-toggle">
      <button class="auth-toggle-btn active" id="btnN8n" onclick="setAuthMode('n8n')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Авторизация</button>
      <button class="auth-toggle-btn" id="btnDemo" onclick="setAuthMode('demo')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></svg> Demo режим</button>
    </div>
    <div id="demoPanel" style="display:none;">
      <div class="login-tabs" id="loginTabs">
        <button class="login-tab active" onclick="setRole('student',this)">Оқушы</button>
        <button class="login-tab" onclick="setRole('teacher',this)">Мұғалім</button>
        <button class="login-tab" onclick="setRole('parent',this)">Ата-ана</button>
        <button class="login-tab" onclick="setRole('admin',this)">Админ</button>
      </div>
      <div class="demo-accounts">
        <p>Demo аккаунттар - басыңыз</p>
        <div id="demoList"></div>
      </div>
    </div>
    <div class="form-mode-toggle" id="formModeToggle">
      <button class="form-mode-btn active" id="btnModeLogin" onclick="setFormMode('login')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.3 9.3"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg> Кіру</button>
      <button class="form-mode-btn" id="btnModeReg" onclick="setFormMode('reg')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22h6a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v10"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10.4 12.6a2 2 0 1 1 3 3L8 21l-4 1 1-4Z"/></svg> Тіркелу</button>
    </div>
    <div class="form-group">
      <label>Логин</label>
      <div class="input-icon-wrap">
        <span class="ico"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <input type="text" id="loginInput" placeholder="логиніңізді енгізіңіз" autocomplete="username">
      </div>
    </div>
    <div class="form-group reg-only" id="fullnameGroup">
      <label>Толық аты-жөні</label>
      <div class="input-icon-wrap">
        <span class="ico"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></span>
        <input type="text" id="fullnameInput" placeholder="Аты-жөніңізді енгізіңіз">
      </div>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <div class="input-icon-wrap">
        <span class="ico"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
        <button class="eye-btn" id="eyeBtn" onclick="togglePwd(this)" tabindex="-1"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <button class="btn btn-primary w-full btn-lg" id="loginBtn" style="margin-top:8px;justify-content:center;gap:10px;" onclick="doLogin()">
      <div class="btn-spinner" id="btnSpinner"></div>
      <span id="loginBtnText">Кіру</span>
    </button>
    <div class="divider">немесе</div>
    <button class="btn btn-ghost w-full" style="justify-content:center;gap:6px;" onclick="loginGuest()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Қонақ ретінде кіру
    </button>
    <div style="text-align:center;margin-top:24px;">
      <a href="../index.html" style="font-size:13px;color:var(--gray);text-decoration:none;">← Басты бетке</a>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../json/decoder.js"></script>
<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
let authMode = 'n8n';
let formMode = 'login';
let currentRole = 'student';
const eyeSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
const eyeOffSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>';

window.addEventListener('DOMContentLoaded', async () => {
  // Сначала грузим данные, потом проверяем авторизацию
  try {
    await initData();
  } catch (e) {
    console.warn('initData failed:', e);
  }

  if (typeof Auth !== 'undefined' && Auth.current()) {
    window.location.href = 'dashboard.html';
    return;
  }
  const savedMode = localStorage.getItem('n8n_auth_mode') || 'n8n';
  setAuthMode(savedMode, true);
  renderDemo('student');
});

function setAuthMode(mode, silent) {
  authMode = mode;
  if (!silent) localStorage.setItem('n8n_auth_mode', mode);
  document.getElementById('btnN8n').classList.toggle('active', mode === 'n8n');
  document.getElementById('btnDemo').classList.toggle('active', mode === 'demo');
  document.getElementById('demoPanel').style.display = mode === 'demo' ? 'block' : 'none';
  document.getElementById('formModeToggle').style.display = mode === 'n8n' ? 'flex' : 'none';
  if (mode === 'demo') setFormMode('login');
}
function setFormMode(mode) {
  formMode = mode;
  document.getElementById('btnModeLogin').classList.toggle('active', mode === 'login');
  document.getElementById('btnModeReg').classList.toggle('active', mode === 'reg');
  document.querySelectorAll('.reg-only').forEach(el => el.classList.toggle('visible', mode === 'reg'));
  document.getElementById('loginBtnText').textContent = mode === 'reg' ? 'Тіркелу' : 'Кіру';
  document.getElementById('loginSub').textContent = mode === 'reg' ? 'Жаңа аккаунт жасаңыз' : 'Аккаунтыңызға кіріңіз';
}
const demos = {
  student: [
    { login: 'tumenovasatti1', pass: 'pass123', name: 'Сатти Т. (11A)' },
    { login: 'adema.tilishbaeva', pass: 'adam123', name: 'Адема Крутая (11A)' },
    { login: 'nurasyl.dzhaksybekov', pass: 'pass456', name: 'Нурасыл Д. (10А)' },
  ],
  teacher: [{ login: 'teacher1', pass: 'teacher123', name: 'Аманова Г. (Математика)' }],
  parent: [{ login: 'parent1', pass: 'parent123', name: 'Ата-ана (Айзат Б.)' }],
  admin: [{ login: 'admin', pass: 'admin123', name: 'Директор Мұсаев' }],
};
function setRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  btn?.classList.add('active');
  renderDemo(role);
}
function renderDemo(role) {
  document.getElementById('demoList').innerHTML = (demos[role] || []).map(d => `
    <div class="demo-acc">
      <span>${d.name}</span>
      <div style="display:flex;gap:6px">
        <code onclick="fillLogin('${d.login}','${d.pass}')">${d.login}</code>
        <code onclick="fillLogin('${d.login}','${d.pass}')">${d.pass}</code>
      </div>
    </div>
  `).join('');
}
function fillLogin(l, p) {
  document.getElementById('loginInput').value = l;
  document.getElementById('passwordInput').value = p;
}
function togglePwd(btn) {
  const inp = document.getElementById('passwordInput');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? eyeOffSvg : eyeSvg;
}
function setLoading(on) {
  const btn = document.getElementById('loginBtn');
  btn.disabled = on;
  document.getElementById('btnSpinner').classList.toggle('show', on);
  document.getElementById('loginBtnText').textContent = on ? 'Тексеру...' : (formMode === 'reg' ? 'Тіркелу' : 'Кіру');
}
async function doLogin() {
  const login = document.getElementById('loginInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();
  if (!login || !password) {
    shakeCard();
    toast('Логин мен парольді енгізіңіз', 'error');
    return;
  }
  setLoading(true);
  if (authMode === 'n8n') {
    await loginViaN8n(login, password);
  } else {
    // Demo режимде LYCEUM_DATA жүктелгенін тексер
    if (!window.LYCEUM_DATA) {
      try { await initData(); } catch (e) {}
    }
    loginLocal(login, password);
  }
  setLoading(false);
}
async function loginViaN8n(login, password) {
  const payload = { action: formMode, login, password };
  if (formMode === 'reg') {
    const fn = document.getElementById('fullnameInput').value.trim();
    if (!fn) { toast('Аты-жөніңізді жазыңыз', 'error'); return; }
    payload.fullname = fn;
  }
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Сервер қатесі');
    const raw = await res.json();
    const data = Array.isArray(raw) ? raw[0] : raw;
    if (!data || data.error || data.success === false) {
      shakeCard();
      toast(data?.message || 'Пайдаланушы табылмады немесе деректер қате', 'error');
      return;
    }
    const roleMap = { 'администрация': 'admin', 'учитель': 'teacher', 'ученик': 'student', 'родитель': 'parent' };
    const role = roleMap[data.status] || 'student';
    const user = {
      id: data.id || login,
      login: data.login || login,
      fullname: data.fullname || login,
      role,
      status: data.status,
      grade: data.grade || '-',
      gpa: data.gpa || 0,
      bilimClass: data.bilimClass || {},
      achievements: data.achievements || [],
      goals: data.goals || [],
      riskLevel: data.riskLevel || 'low',
      rank: data.rank || null,
    };
    sessionStorage.setItem('aqbobek_user', JSON.stringify(user));
    toast(`Қош келдіңіз, ${user.fullname}!`, 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 700);
  } catch (e) {
    shakeCard();
    toast('Байланыс қатесі: n8n жауап бермеді', 'error');
  }
}
function loginLocal(login, password) {
  if (typeof Auth === 'undefined') { toast('Auth жүйесі жүктелмеді', 'error'); return; }
  const user = Auth.login(login, password);
  if (user) {
    toast(`Қош келдіңіз, ${user.fullname || user.login}!`, 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 700);
  } else {
    shakeCard();
    toast('Логин немесе пароль қате (Demo)', 'error');
  }
}
function loginGuest() {
  const guest = { id: 0, login: 'guest', fullname: 'Қонақ', role: 'student', gpa: 0, bilimClass: {}, achievements: [], goals: [], events: [], riskLevel: 'low', grade: '-' };
  sessionStorage.setItem('aqbobek_user', JSON.stringify(guest));
  toast('Қонақ ретінде кірдіңіз', 'info');
  setTimeout(() => window.location.href = 'dashboard.html', 500);
}
function shakeCard() {
  const card = document.querySelector('.login-card');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
