<!DOCTYPE html>
<html lang="kk">
<head>
    <link rel="icon" type="image/png" href="../website-icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Aqbobek Lyceum</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="toggleSidebar()" class="btn btn-ghost btn-sm" id="mobileMenuBtn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
        <div class="topbar-title" id="topbarTitle">Негізгі бет</div>
      </div>
      <div class="topbar-actions">
        <span id="topbarDate" style="font-size:12px;color:var(--gray)"></span>
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </div>
    <div class="page-content" id="mainContent">
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
  const user = Auth.require();
  buildSidebar('dashboard', user.role);
  document.getElementById('topbarAvatar').textContent = initials(user.fullname || user.login);
  document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('kk-KZ', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  const mobileBtn = document.getElementById('mobileMenuBtn');
  mobileBtn.innerHTML = ICONS.menu;
  if (window.innerWidth < 1024) mobileBtn.style.display = 'flex';
  const main = document.getElementById('mainContent');
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      await initData();
      if (user.role === 'student')     renderStudentDash();
      else if (user.role === 'teacher') renderTeacherDash();
      else if (user.role === 'parent')  renderParentDash();
      else                              renderAdminDash();
    } catch (err) {
      console.error('Init error:', err);
      main.innerHTML = `<div class="card"><p style="color:red">Деректерді жүктеу қатесі: ${err.message}</p></div>`;
    }
  });
  function renderStudentDash() {
    const student = LYCEUM_DATA.students.find(s => 
      String(s.id) === String(user.id) || s.login === user.login
    ) || LYCEUM_DATA.students[0];
    const subjects = student.bilimClass ? Object.keys(student.bilimClass) : [];
    const avgVals  = subjects.map(sub => subjectAvg(student.bilimClass)[sub] || 0);
    const overall  = student.bilimClass ? overallAvg(student.bilimClass) : '--';
    const avgs     = student.bilimClass ? subjectAvg(student.bilimClass) : {};
    main.innerHTML = `
      <div style="margin-bottom:24px;">
        <h1 style="margin-bottom:6px;">Оқушы панелі</h1>
        <div style="color:var(--gray);font-size:14px;">${student.fullname} · ${student.grade}</div>
      </div>
      <div class="quick-stats">
        <div class="stat-card"><div class="stat-icon purple">${ICONS.barChart}</div><div><div class="stat-num">${overall}</div><div class="stat-label">Орта балл</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">${ICONS.trophy}</div><div><div class="stat-num">${student.achievements?.length||0}</div><div class="stat-label">Жетістіктер</div></div></div>
        <div class="stat-card"><div class="stat-icon green">${ICONS.medal}</div><div><div class="stat-num">#${student.rank||'-'}</div><div class="stat-label">Рейтинг</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">${ICONS.shield}</div><div><div class="stat-num" style="font-size:14px">${riskBadge(student.riskLevel)}</div><div class="stat-label">Тәуекел</div></div></div>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Пәндер үлгерімі</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Пән</th><th>Орта балл</th><th>Бағалар</th><th>Үрдіс</th></tr></thead>
              <tbody>
                ${Object.entries(avgs).map(([sub, avg]) => `
                  <tr>
                    <td><strong>${sub}</strong></td>
                    <td><div class="grade-cell ${gradeColor(avg)}">${avg}</div></td>
                    <td style="font-size:12px;color:var(--gray)">${(student.bilimClass[sub]||[]).join(', ')}</td>
                    <td>${trendArrow(student.bilimClass[sub]||[])}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Мақсаттар</h3>
          <div id="goalsList"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
  <div class="card">
    <h3 style="margin-bottom:16px">Диаграмма</h3>
    <div style="position:relative; width:100%; height:280px;">
      <canvas id="subjectsChart"></canvas>
    </div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:16px">Радар</h3>
    <div style="position:relative; width:100%; height:280px;">
      <canvas id="radarChart"></canvas>
    </div>
  </div>
</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Жетістіктер</h3>
          <div id="achList"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Іс-шаралар</h3>
          <div id="eventsPreview"></div>
        </div>
      </div>
    `;
    setTimeout(() => {
      const subChart = document.getElementById('subjectsChart');
      const radChart = document.getElementById('radarChart');
      if (subChart) barChart(subChart, subjects, avgVals);
      if (radChart) radarChart(radChart, subjects, avgVals);
    }, 50);
    const goalsList = document.getElementById('goalsList');
    if (goalsList) {
      (student.goals || []).forEach(g => {
        goalsList.innerHTML += `<div class="goal-item"><div class="goal-icon">${ICONS.target}</div><div class="goal-text">${g}</div></div>`;
      });
      if (!student.goals?.length) goalsList.innerHTML = '<div class="text-gray text-sm">Мақсаттар қосылмаған</div>';
    }
    const achList = document.getElementById('achList');
    if (achList) {
      (student.achievements || []).slice(0, 3).forEach(a => {
        achList.innerHTML += `
          <div class="ach-badge-card">
            <div class="ach-emoji">${ICONS.trophy}</div>
            <div class="ach-info"><strong>${a.title}</strong><span>${a.place}-орын · ${a.year}</span></div>
          </div>`;
      });
      if (!student.achievements?.length) achList.innerHTML = '<div class="text-gray text-sm">Жетістіктер жоқ</div>';
    }
    const evPrev = document.getElementById('eventsPreview');
    if (evPrev) {
      LYCEUM_DATA.events.slice(0, 3).forEach(ev => {
        evPrev.innerHTML += renderEventCard(ev);
      });
    }
  }
  function renderTeacherDash() {
    const teacher = LYCEUM_DATA.teachers.find(t => t.id === user.id) || user;
    const allStudents = LYCEUM_DATA.students;
    const riskStudents = allStudents.filter(s => s.riskLevel !== 'low');
    const classAvg = (allStudents.reduce((sum, s) => {
      return sum + parseFloat(s.bilimClass ? overallAvg(s.bilimClass) : 0);
    }, 0) / allStudents.length).toFixed(1);
    main.innerHTML = `
      <div style="margin-bottom:24px;">
        <h1 style="margin-bottom:6px;">Мұғалім панелі</h1>
        <div style="color:var(--gray);font-size:14px;">${teacher.subject || ''} · ${teacher.grade || ''}</div>
      </div>
      <div class="quick-stats">
        <div class="stat-card"><div class="stat-icon purple">${ICONS.users}</div><div><div class="stat-num">${allStudents.length}</div><div class="stat-label">Оқушылар</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">${ICONS.barChart}</div><div><div class="stat-num">${classAvg}</div><div class="stat-label">Сынып GPA</div></div></div>
        <div class="stat-card"><div class="stat-icon red">${ICONS.alertTriangle}</div><div><div class="stat-num">${riskStudents.length}</div><div class="stat-label">Тәуекел аймағы</div></div></div>
        <div class="stat-card"><div class="stat-icon green">${ICONS.trophy}</div><div><div class="stat-num">${allStudents.reduce((a,s)=>a+(s.achievements?.length||0),0)}</div><div class="stat-label">Жетістіктер</div></div></div>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Оқушылар үлгерімі</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Оқушы</th><th>Сынып</th><th>GPA</th><th>Тәуекел</th><th>Жетістіктер</th></tr></thead>
              <tbody>
                ${allStudents.map(s => `
                  <tr>
                    <td><div style="display:flex;align-items:center;gap:8px;">
                      <div class="avatar" style="width:28px;height:28px;font-size:10px">${initials(s.fullname)}</div>
                      <span style="font-weight:600">${s.fullname}</span>
                    </div></td>
                    <td><span class="badge badge-purple">${s.grade}</span></td>
                    <td><strong style="color:var(--p1)">${s.bilimClass ? overallAvg(s.bilimClass) : '-'}</strong></td>
                    <td>${riskBadge(s.riskLevel)}</td>
                    <td>${s.achievements?.length || 0} жетістік</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Тәуекел аймағы</h3>
          ${riskStudents.map(s => `
            <div class="risk-student-row">
              <div class="avatar" style="width:32px;height:32px;font-size:11px">${initials(s.fullname)}</div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:13px">${s.fullname}</div>
                <div style="font-size:11px;color:var(--gray)">${s.grade} · GPA ${s.bilimClass ? overallAvg(s.bilimClass) : '-'}</div>
              </div>
              ${riskBadge(s.riskLevel)}
            </div>
          `).join('')}
          ${!riskStudents.length ? '<div class="text-gray text-sm">Тәуекел аймағында оқушы жоқ</div>' : ''}
          <a href="risk-zone.html" class="btn btn-outline btn-sm w-full" style="margin-top:16px">Толық</a>
        </div>
      </div>
      <div style="margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Жақын іс-шаралар</h3>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
            ${LYCEUM_DATA.events.slice(0,3).map(renderEventCard).join('')}
          </div>
        </div>
      </div>
    `;
  }
  function renderParentDash() {
    const parent = LYCEUM_DATA.parents.find(p => p.id === user.id) || user;
    const child  = LYCEUM_DATA.students.find(s => s.id === parent.childId) || LYCEUM_DATA.students[0];
    const overall = child.bilimClass ? overallAvg(child.bilimClass) : '--';
    const avgs    = child.bilimClass ? subjectAvg(child.bilimClass) : {};
    main.innerHTML = `
      <div style="margin-bottom:24px;">
        <h1 style="margin-bottom:6px;">Ата-ана панелі</h1>
        <div style="color:var(--gray);font-size:14px;">Баланыз: ${child.fullname}</div>
      </div>
      <div style="background:linear-gradient(135deg,var(--p1),var(--p3));border-radius:var(--radius);padding:24px;margin-bottom:20px;color:#fff;">
        <div style="display:flex;align-items:center;gap:20px;">
          <div class="avatar avatar-xl" style="background:rgba(255,255,255,0.2);font-size:28px">${initials(child.fullname)}</div>
          <div>
            <h2 style="color:#fff;margin-bottom:4px">${child.fullname}</h2>
            <div style="color:rgba(255,255,255,0.7)">${child.grade} · Рейтинг #${child.rank}</div>
            <div style="margin-top:10px;display:flex;gap:12px;">
              <span class="badge" style="background:rgba(255,255,255,0.15);color:#fff">GPA ${overall}</span>
              <span class="badge" style="background:rgba(255,255,255,0.15);color:#fff">${child.achievements?.length||0} жетістік</span>
              ${riskBadge(child.riskLevel)}
            </div>
          </div>
        </div>
      </div>
      <div class="quick-stats">
        <div class="stat-card"><div class="stat-icon purple">${ICONS.barChart}</div><div><div class="stat-num">${overall}</div><div class="stat-label">Орта балл</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">${ICONS.trophy}</div><div><div class="stat-num">${child.achievements?.length||0}</div><div class="stat-label">Жетістіктер</div></div></div>
        <div class="stat-card"><div class="stat-icon green">${ICONS.medal}</div><div><div class="stat-num">#${child.rank}</div><div class="stat-label">Рейтинг</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">${ICONS.calendar}</div><div><div class="stat-num">${child.events?.length||0}</div><div class="stat-label">Іс-шара</div></div></div>
      </div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Пәндер үлгерімі</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Пән</th><th>Орташа балл</th><th>Бағалар</th><th>Үрдіс</th></tr></thead>
              <tbody>
                ${Object.entries(avgs).map(([sub, avg]) => `
                  <tr>
                    <td><strong>${sub}</strong></td>
                    <td><div class="grade-cell ${gradeColor(avg)}">${avg}</div></td>
                    <td style="font-size:12px;color:var(--gray)">${(child.bilimClass[sub]||[]).join(', ')}</td>
                    <td>${trendArrow(child.bilimClass[sub]||[])}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Жетістіктер</h3>
          ${(child.achievements||[]).map(a => `
            <div class="ach-badge-card" style="margin-bottom:8px">
              <div class="ach-emoji">${ICONS.trophy}</div>
              <div class="ach-info"><strong>${a.title}</strong><span>${a.place}-орын · ${a.year}</span></div>
            </div>
          `).join('') || '<div class="text-gray text-sm">Жетістіктер жоқ</div>'}
        </div>
      </div>
    `;
  }
  function renderAdminDash() {
    const allStudents = LYCEUM_DATA.students;
    const totalAch  = allStudents.reduce((a,s)=>a+(s.achievements?.length||0),0);
    const riskCount = allStudents.filter(s=>s.riskLevel==='high').length;
    const avgGPA    = (allStudents.reduce((a,s)=>a+parseFloat(s.bilimClass?overallAvg(s.bilimClass):0),0)/allStudents.length).toFixed(1);

    main.innerHTML = `
      <style>
        .adm-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .adm-tab {
          padding:8px 18px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
          background:transparent; cursor:pointer; font-size:13px; font-weight:600;
          color:var(--gray); transition:all 0.2s; font-family:var(--font);
        }
        .adm-tab:hover { border-color:var(--p1); color:var(--p1); }
        .adm-tab.active { border-color:var(--p1); color:var(--p1); background:rgba(79,70,229,0.06); }
        .adm-page { display:none; }
        .adm-page.active { display:block; }

        .adm-status-dot {
          width:10px; height:10px; border-radius:50%; background:var(--border);
          flex-shrink:0; transition:background .3s;
        }
        .adm-status-dot.ok  { background:var(--green); box-shadow:0 0 6px rgba(16,185,129,.5); }
        .adm-status-dot.err { background:var(--red);   box-shadow:0 0 6px rgba(239,68,68,.5); }

        .adm-stats-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .adm-stat-mini {
          background:var(--cream); border:1px solid var(--border);
          border-radius:var(--radius-sm); padding:12px 18px; flex:1; min-width:90px;
        }
        .adm-stat-mini-label { font-size:10px; color:var(--gray); text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; }
        .adm-stat-mini-val   { font-size:24px; font-weight:700; line-height:1; }

        .adm-action-bar { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }

        .adm-data-table { width:100%; border-collapse:collapse; font-size:13px; }
        .adm-data-table th { text-align:left; padding:10px 12px; font-size:11px; color:var(--gray); text-transform:uppercase; letter-spacing:.5px; background:var(--cream); border-bottom:1px solid var(--border); }
        .adm-data-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
        .adm-data-table tr:last-child td { border-bottom:none; }
        .adm-data-table tr:hover td { background:rgba(79,70,229,.02); }

        .adm-badge {
          display:inline-flex; align-items:center; padding:2px 8px; border-radius:100px;
          font-size:10px; font-weight:600; letter-spacing:.3px; margin-right:3px;
        }
        .adm-badge-red    { background:#fef2f2; color:#b91c1c; }
        .adm-badge-green  { background:#f0fdf4; color:#15803d; }
        .adm-badge-yellow { background:#fefce8; color:#a16207; }
        .adm-badge-blue   { background:#eff6ff; color:#1d4ed8; }

        .adm-log-panel {
          margin-top:10px; max-height:110px; overflow-y:auto;
          background:var(--cream); border:1px solid var(--border);
          border-radius:var(--radius-sm); padding:8px 12px;
          font-size:11px; font-family:monospace;
        }
        .adm-log-entry { display:flex; gap:8px; padding:2px 0; }
        .adm-log-time { color:var(--gray); flex-shrink:0; }
        .adm-log-ok   { color:var(--green); }
        .adm-log-err  { color:var(--red); }
        .adm-log-info { color:var(--p1); }

        .adm-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
        .adm-bar-label { min-width:56px; font-size:12px; font-weight:600; }
        .adm-bar-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
        .adm-bar-fill  { height:100%; border-radius:4px; transition:width .4s; }
        .adm-bar-pct   { min-width:38px; font-size:12px; font-weight:700; text-align:right; }

        .adm-schedule-timeline { display:flex; flex-direction:column; gap:8px; }
        .adm-slot {
          display:flex; align-items:center; gap:14px; padding:12px 16px;
          border:1px solid var(--border); border-radius:var(--radius-sm);
          background:var(--cream); transition:border-color .2s;
        }
        .adm-slot.active-slot { border-color:var(--p1); background:rgba(79,70,229,.04); }
        .adm-slot-time { font-size:13px; font-weight:700; min-width:48px; font-family:monospace; color:var(--p1); }
        .adm-slot-subj { font-size:13px; font-weight:600; }
        .adm-slot-meta { font-size:11px; color:var(--gray); margin-top:1px; }
        .adm-slot-room { margin-left:auto; font-size:12px; color:var(--gray); white-space:nowrap; }

        .adm-eis-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .adm-quadrant { border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px; min-height:120px; background:var(--cream); }
        .adm-q-num   { font-size:10px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.8px; margin-bottom:3px; }
        .adm-q-title { font-size:13px; font-weight:700; margin-bottom:2px; }
        .adm-q-sub   { font-size:11px; color:var(--gray); margin-bottom:10px; }
        .adm-task-item { display:flex; gap:8px; align-items:flex-start; margin-bottom:6px; }
        .adm-task-dot  { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px; }
        .adm-task-msg  { font-size:12px; line-height:1.4; }
        .adm-task-id   { font-size:10px; color:var(--gray); font-family:monospace; }

        .adm-spinner {
          width:24px; height:24px; border:2px solid var(--border);
          border-top-color:var(--p1); border-radius:50%;
          animation:adm-spin .7s linear infinite; margin:28px auto; display:block;
        }
        @keyframes adm-spin { to { transform:rotate(360deg); } }
        .adm-empty { text-align:center; padding:32px; color:var(--gray); font-size:13px; }
        .adm-empty-icon { font-size:30px; margin-bottom:8px; }

        /* Modals */
        .adm-overlay {
          display:none; position:fixed; inset:0; background:rgba(15,23,42,.45);
          z-index:9000; align-items:center; justify-content:center;
        }
        .adm-overlay.open { display:flex; }
        .adm-modal {
          background:var(--card); border:1px solid var(--border);
          border-radius:var(--radius); padding:32px; width:90%; max-width:440px;
          box-shadow:var(--shadow-xl);
        }
        .adm-modal-title { font-size:17px; font-weight:700; margin-bottom:20px; }
        .adm-form-group  { margin-bottom:14px; }
        .adm-form-label  { font-size:11px; font-weight:600; color:var(--gray); text-transform:uppercase; letter-spacing:.6px; display:block; margin-bottom:5px; }

  // ══════════════════════════════════════════════════
  // DIRECTOR PANEL — CORE
  // ══════════════════════════════════════════════════
  const ADM_WEBHOOK_URL = 'https://asicapital.asia/webhook/0fd5ddfa-cf60-41fa-af06-bdac7fd48d06';
  let admCurrentPage = 'incidents';
  let admAllIncidents = [];
  let admToastTimer;

  function admEsc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function admTodayStr() { return new Date().toISOString().split('T')[0]; }
  function admFmtTime(str) {
    if (!str) return '—';
    try { return new Date(str).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
    catch(e) { return str; }
  }
  function admFmtShort(str) {
    if (!str) return '—';
    try { return new Date(str).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
    catch(e) { return str; }
  }
  function admShowToast(msg, type) {
    const t = document.getElementById('admToast');
    if (!t) return;
    t.textContent = msg;
    t.className = 'show ' + (type==='ok' ? 'toast-ok' : type==='err' ? 'toast-err' : '');
    clearTimeout(admToastTimer);
    admToastTimer = setTimeout(() => { t.className = ''; }, 3000);
  }
  function admOpenIncidentModal() { document.getElementById('admIncidentModal')?.classList.add('open'); }
  function admOpenTaskModal()     { document.getElementById('admTaskModal')?.classList.add('open'); }
  function admCloseModal(id)      { document.getElementById(id)?.classList.remove('open'); }

  function admSetStatus(ok) {
    const dot = document.getElementById('admStatusDot');
    if (!dot) return;
    dot.className = 'adm-status-dot ' + (ok===true ? 'ok' : ok===false ? 'err' : '');
  }
  function admLogMsg(logId, cls, msg) {
    const el = document.getElementById(logId);
    if (!el) return;
    const ts = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    el.innerHTML += `<div class="adm-log-entry"><span class="adm-log-time">${ts}</span><span class="adm-log-${cls}">${admEsc(msg)}</span></div>`;
    el.scrollTop = el.scrollHeight;
  }

  async function admWebhookSend(payload, logId) {
    admLogMsg(logId, 'info', '→ ' + payload.method);
    try {
      const res = await fetch(ADM_WEBHOOK_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        admLogMsg(logId, 'err', 'HTTP ' + res.status + ' ' + res.statusText);
        admSetStatus(false);
        return null;
      }
      let raw = await res.json();
      let data = raw;
      if (Array.isArray(raw) && raw.length > 0 && raw[0] !== null && typeof raw[0]==='object' && 'json' in raw[0]) {
        data = raw.map(i => i.json);
      }
      admLogMsg(logId, 'ok', '← 200 OK · ' + JSON.stringify(data).slice(0,80) + '...');
      admSetStatus(true);
      return data;
    } catch(e) {
      admLogMsg(logId, 'err', e.message);
      admSetStatus(false);
      return null;
    }
  }

  function admShowPage(name, btn) {
    document.querySelectorAll('.adm-page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.adm-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('adm-page-' + name)?.classList.add('active');
    btn?.classList.add('active');
    admCurrentPage = name;
    if (name==='incidents')  admLoadIncidents();
    if (name==='attendance') admLoadAttendance();
    if (name==='schedule')   admLoadSchedule();
    if (name==='eisenhower') admLoadEisenhower();
  }
  function admRefreshCurrent() {
    if (admCurrentPage==='incidents')  admLoadIncidents();
    if (admCurrentPage==='attendance') admLoadAttendance();
    if (admCurrentPage==='schedule')   admLoadSchedule();
    if (admCurrentPage==='eisenhower') admLoadEisenhower();
  }

  // ── INCIDENTS ──
  function admToBool(v) {
    if (v===true||v===1||v==='true'||v==='1')   return true;
    if (v===false||v===0||v==='false'||v==='0') return false;
    return null;
  }
  function admSeverity(inc) {
    const u=admToBool(inc.urgent), im=admToBool(inc.important);
    if (u===true  && im===true)  return 'critical';
    if (u===false && im===true)  return 'warning';
    if (u===true  && im===false) return 'urgent';
    return 'info';
  }
  async function admLoadIncidents() {
    const el = document.getElementById('admIncidentsBody');
    if (!el) return;
    el.innerHTML = '<div style="text-align:center;padding:28px"><div class="adm-spinner"></div></div>';
    const data = await admWebhookSend({method:'get_incidents'}, 'admIncLog');
    if (!data) { admRenderIncidentsEmpty(); return; }
    if (Array.isArray(data))              admAllIncidents = data;
    else if (data.incidents)              admAllIncidents = Array.isArray(data.incidents) ? data.incidents : [data.incidents];
    else if (data.data)                   admAllIncidents = Array.isArray(data.data) ? data.data : [data.data];
    else if (data.message!=null||data.id!=null) admAllIncidents = [data];
    else                                  admAllIncidents = [];
    admRenderIncidents(admAllIncidents);
    admUpdateStats(admAllIncidents);
  }
  function admUpdateStats(inc) {
    
    const set = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
    set('adm-inc-total', inc.length);
    set('adm-inc-crit',  inc.filter(i=>admSeverity(i)==='critical').length);
    set('adm-inc-open',  inc.filter(i=>i.message).length);
    set('adm-inc-res',   inc.filter(i=>!i.message).length);
  }
  function admFilterIncidents() {
    const f = document.getElementById('admIncidentFilter').value;
    let filtered = admAllIncidents;
    if (f==='critical') filtered = admAllIncidents.filter(i=>admSeverity(i)==='critical');
    else if (f==='warning')  filtered = admAllIncidents.filter(i=>admSeverity(i)==='warning');
    else if (f==='resolved') filtered = admAllIncidents.filter(i=>!i.message);
    else if (f==='info')     filtered = admAllIncidents.filter(i=>['info','urgent'].includes(admSeverity(i)));
    admRenderIncidents(filtered);
  }
  function admRenderIncidents(incidents) {
    const el = document.getElementById('admIncidentsBody');
    if (!el) return;
    if (!incidents.length) { admRenderIncidentsEmpty(); return; }
    const sevColor = s => s==='critical'?'var(--red)':s==='warning'?'var(--gold)':s==='urgent'?'#f97316':'var(--gray)';
    const rows = incidents.map(inc => {
      const sev=admSeverity(inc), hasMsg=!!inc.message;
      const urgB = inc.urgent===true  ? '<span class="adm-badge adm-badge-red">Шұғыл</span>'
                 : inc.urgent===false ? '<span class="adm-badge adm-badge-green">Шұғыл емес</span>'
                 : '<span class="adm-badge" style="background:var(--cream);color:var(--gray)">—</span>';
      const impB = inc.important===true  ? '<span class="adm-badge adm-badge-yellow">Маңызды</span>'
                 : inc.important===false ? '<span class="adm-badge adm-badge-blue">Маңызды емес</span>'
                 : '<span class="adm-badge" style="background:var(--cream);color:var(--gray)">—</span>';
      return `<tr style="${hasMsg?'':'opacity:.45'}">
        <td><span style="font-size:11px;color:var(--gray);font-family:monospace">#${admEsc(inc.id)}</span></td>
        <td><div style="font-weight:600;font-size:13px;color:${sevColor(sev)}">${hasMsg?admEsc(inc.message):'<em style="color:var(--gray)">Хабарлама жоқ</em>'}</div>
            <div style="font-size:10px;color:var(--gray);font-family:monospace;margin-top:2px">Алынды: ${admFmtTime(inc.received_time)} · Жасалды: ${admFmtTime(inc.createdAt)}</div></td>
        <td>${urgB}${impB}</td>
        <td>${hasMsg?'<span class="badge badge-red">Ашық</span>':'<span class="badge badge-green">Бос</span>'}</td>
        <td><span style="font-size:10px;color:var(--gray);font-family:monospace">${admFmtTime(inc.updatedAt)}</span></td>
      </tr>`;
    }).join('');
    el.innerHTML = `<div class="table-wrap"><table class="adm-data-table"><thead><tr><th>ID</th><th>Хабарлама</th><th>Басымдылық</th><th>Статус</th><th>Жаңартылды</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  function admRenderIncidentsEmpty() {
    const el = document.getElementById('admIncidentsBody');
    if (el) el.innerHTML = '<div class="adm-empty"><div class="adm-empty-icon">✓</div><p>Инциденттер табылмады</p></div>';
  }
  async function admSubmitIncident() {
    const payload = {
      method: 'create_incident',
      type: document.getElementById('adm-inc-type').value,
      message: document.getElementById('adm-inc-title').value.trim(),
      description: document.getElementById('adm-inc-desc').value.trim(),
      location: document.getElementById('adm-inc-location').value.trim(),
      timestamp: new Date().toISOString()
    };
    if (!payload.message) { admShowToast('Тақырыпты енгізіңіз', 'err'); return; }
    admCloseModal('admIncidentModal');
    const data = await admWebhookSend(payload, 'admIncLog');
    if (data) { admShowToast('Инцидент жіберілді', 'ok'); admLoadIncidents(); }
    else admShowToast('Жіберу қатесі', 'err');
  }

  // ── ATTENDANCE ──
  async function admLoadAttendance() {
    ['adm-att-by-class','adm-att-teachers'].forEach(id => {
      const el=document.getElementById(id);
      if(el) el.innerHTML='<div style="text-align:center;padding:20px"><div class="adm-spinner"></div></div>';
    });
    const data = await admWebhookSend({method:'get_attendance', date:admTodayStr()}, 'admAttLog');
    console.log('RAW attendance response:', JSON.stringify(data)); // ← добавьте
    console.log('Attendance data:', data);
    const byClass=document.getElementById('adm-att-by-class'), byTeacher=document.getElementById('adm-att-teachers');
    if (!data) {
      if(byClass) byClass.innerHTML='<div class="adm-empty"><p>Деректер жоқ</p></div>';
      if(byTeacher) byTeacher.innerHTML='<div class="adm-empty"><p>Деректер жоқ</p></div>';
      return;
    }
    let rows;
    if (Array.isArray(data))              rows=data;
    else if (data.attendance)             rows=Array.isArray(data.attendance)?data.attendance:[data.attendance];
    else if (data.data)                   rows=Array.isArray(data.data)?data.data:[data.data];
    else if (data.grade!=null||data.in_time!=null) rows=[data];
    else rows=[];

    const totalInTime=rows.reduce((s,r)=>s+(r.in_time||0),0);
    const totalLate=rows.reduce((s,r)=>s+(r.late||0),0);
    const totalAbsent=rows.reduce((s,r)=>s+(r.not_in_school||0),0);
    const totalAll=totalInTime+totalLate+totalAbsent;
    const pct=totalAll?Math.round(((totalInTime+totalLate)/totalAll)*100):null;
    const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
    set('adm-att-total',   totalAll||'—');
    set('adm-att-present', (totalInTime+totalLate)||'—');
    set('adm-att-absent',  totalAbsent||'—');
    set('adm-att-pct',     pct!==null?pct+'%':'—');

    if (byClass) {
      if (rows.length) {
        byClass.innerHTML = rows.map(r => {
          const total=(r.in_time||0)+(r.late||0)+(r.not_in_school||0);
          const present=(r.in_time||0)+(r.late||0);
          const p=total?Math.round((present/total)*100):0;
          const color=p>=90?'var(--green)':p>=75?'var(--gold)':'var(--red)';
          return `<div class="adm-bar-row">
            <div class="adm-bar-label">${admEsc(r.grade||'—')}</div>
            <div class="adm-bar-track"><div class="adm-bar-fill" style="width:${p}%;background:${color}"></div></div>
            <div class="adm-bar-pct" style="color:${color}">${p}%</div>
          </div>
          <div style="font-size:10px;color:var(--gray);padding-left:70px;margin-top:-4px;margin-bottom:8px;">
            ✓ ${r.in_time||0} · ⏱ ${r.late||0} · ✗ ${r.not_in_school||0}
          </div>`;
        }).join('');
      } else {
        byClass.innerHTML = '<div class="adm-empty"><p>Сынып бойынша деректер жоқ</p></div>';
      }
    }
    if (byTeacher) byTeacher.innerHTML='<div class="adm-empty" style="font-size:11px;color:var(--gray)">Бөлім әзірленуде</div>';
  }

  // ── SCHEDULE ──
  async function admLoadSchedule() {
    const el = document.getElementById('admScheduleBody');
    if (!el) return;
    el.innerHTML = '<div style="text-align:center;padding:28px"><div class="adm-spinner"></div></div>';
    const data = await admWebhookSend({method:'get_schedule', date:admTodayStr()}, 'admSchedLog');
    if (!data) { el.innerHTML='<div class="adm-empty"><div class="adm-empty-icon">📅</div><p>Деректер жоқ</p></div>'; return; }
    const slots=Array.isArray(data)?data:(data.schedule||data.slots||[]);
    if (!slots.length) { el.innerHTML='<div class="adm-empty"><div class="adm-empty-icon">📅</div><p>Бүгінгі кесте жоқ</p></div>'; return; }
    const now=new Date(), nowMin=now.getHours()*60+now.getMinutes();
    el.innerHTML = '<div class="adm-schedule-timeline">' + slots.map(slot => {
      const timeStr=slot.time||slot.start_time||'00:00';
      const parts=timeStr.split(':');
      const slotMin=parseInt(parts[0]||0)*60+parseInt(parts[1]||0);
      const isActive=slotMin<=nowMin&&nowMin<slotMin+45;
      return `<div class="adm-slot${isActive?' active-slot':''}">
        <div class="adm-slot-time">${admEsc(timeStr)}</div>
        <div><div class="adm-slot-subj">${admEsc(slot.subject||slot.name||'—')}</div>
             <div class="adm-slot-meta">${admEsc(slot.teacher||'')}${slot.class?' · '+admEsc(slot.class):''}</div></div>
        <div class="adm-slot-room">Каб. ${admEsc(String(slot.room||slot.classroom||'—'))}</div>
      </div>`;
    }).join('') + '</div>';
  }
  async function admCreateTodaySchedule() {
    const btn = document.querySelector('[onclick="admCreateTodaySchedule()"]');
    if (btn) { btn.disabled=true; btn.textContent='Жіберілуде...'; }
    const data = await admWebhookSend({method:'create_schedule', date:admTodayStr(), day_of_week:new Date().toLocaleDateString('ru-RU',{weekday:'long'}), timestamp:new Date().toISOString()}, 'admSchedLog');
    if (btn) { btn.disabled=false; btn.textContent='📅 Бүгінгі кесте жасау'; }
    if (data) { admShowToast('Кесте жасалды!', 'ok'); setTimeout(admLoadSchedule, 500); }
    else admShowToast('Жасау қатесі', 'err');
  }

  // ── EISENHOWER ──
  function admGetQuadrant(inc) {
    const u=admToBool(inc.urgent), im=admToBool(inc.important);
    if (u===true  && im===true)  return 'q1';
    if (u===false && im===true)  return 'q2';
    if (u===true  && im===false) return 'q3';
    if (u===false && im===false) return 'q4';
    if (im===true) return 'q2'; if (im===false) return 'q4';
    if (u===true)  return 'q3'; return null;
  }
async function admLoadEisenhower() {
    ['q1', 'q2', 'q3', 'q4'].forEach(q => {
        const el = document.getElementById('adm-' + q + '-tasks');
        if (el) el.innerHTML = '<div style="font-size:11px;color:var(--gray);padding:4px 0">Жүктелуде...</div>';
    });

    const data = await admWebhookSend({ method: 'get_incidents' }, 'admEisLog');
    if (!data) {
        ['q1', 'q2', 'q3', 'q4'].forEach(q => {
            const el = document.getElementById('adm-' + q + '-tasks');
            if (el) el.innerHTML = '<div style="font-size:11px;color:var(--gray);padding:4px 0">— деректер жоқ —</div>';
        });
        return;
    }

    let rawIncidents = [];
    if (Array.isArray(data)) rawIncidents = data;
    else if (data.incidents) rawIncidents = Array.isArray(data.incidents) ? data.incidents : [data.incidents];
    else if (data.data) rawIncidents = Array.isArray(data.data) ? data.data : [data.data];
    else if (data.message != null || data.id != null) rawIncidents = [data];

    // --- БЛОК УДАЛЕНИЯ ПОВТОРОВ ---
    const seen = new Set();
    const incidents = rawIncidents.filter(inc => {
        // Создаем уникальный ключ: если есть ID - берем его, если нет - текст сообщения
        const duplicateKey = inc.id || inc.message; 
        if (seen.has(duplicateKey)) {
            return false; // Пропускаем, если уже видели
        }
        seen.add(duplicateKey);
        return true; // Оставляем
    });
    // ----------------------------

    const qColors = { q1: 'var(--red)', q2: 'var(--green)', q3: 'var(--gold)', q4: 'var(--blue)' };

    ['q1', 'q2', 'q3', 'q4'].forEach(q => {
        const el = document.getElementById('adm-' + q + '-tasks');
        if (!el) return;

        const items = incidents.filter(inc => admGetQuadrant(inc) === q && inc.message);

        if (!items.length) {
            el.innerHTML = '<div style="font-size:11px;color:var(--gray);padding:4px 0">— бос —</div>';
            return;
        }

        el.innerHTML = items.map(inc => `<div class="adm-task-item">
        <div class="adm-task-dot" style="background:${qColors[q]}"></div>
        <div><div class="adm-task-msg">${admEsc(inc.message)}</div>
             <div class="adm-task-id">#${admEsc(inc.id || 'new')} · ${admFmtShort(inc.received_time || inc.createdAt)}</div></div>
      </div>`).join('');
    });
}

async function admSubmitTask() {
    const titleEl=document.getElementById('adm-task-title'), quadEl=document.getElementById('adm-task-quadrant');
    if (!titleEl||!quadEl) return;
    const q=quadEl.value;
    const payload={method:'create_incident', message:titleEl.value.trim(), urgent:(q==='q1'||q==='q3'), important:(q==='q1'||q==='q2'), timestamp:new Date().toISOString()};
    if (!payload.message) { admShowToast('Тапсырма атауын енгізіңіз','err'); return; }
    admCloseModal('admTaskModal');
    const data=await admWebhookSend(payload,'admEisLog');
    if (data) { admShowToast('Тапсырма қосылды','ok'); admLoadEisenhower(); }
    else admShowToast('Қосу қатесі','err');
  }
</script>
