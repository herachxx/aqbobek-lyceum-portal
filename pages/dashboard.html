<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Ақбөбек Portal</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>

  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button onclick="toggleSidebar()" class="btn btn-ghost btn-sm" style="display:none" id="mobileMenuBtn">☰</button>
        <div class="topbar-title" id="topbarTitle">Негізгі бет</div>
      </div>
      <div class="topbar-actions">
        <span id="topbarDate" style="font-size:12px;color:var(--gray)"></span>
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </div>

    <div class="page-content" id="mainContent">
      <!-- dynamic content per role -->
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
  const user = Auth.require();
  buildSidebar('dashboard', user.role);

  document.getElementById('topbarAvatar').textContent = initials(user.fullname || user.login);
  document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('kk-KZ', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  if (window.innerWidth < 1024) document.getElementById('mobileMenuBtn').style.display = 'flex';

  const main = document.getElementById('mainContent');

  // Роутинг по роли — один раз, после DOMContentLoaded
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      await initData();

      if (user.role === 'student')     renderStudentDash();
      else if (user.role === 'teacher') renderTeacherDash();
      else if (user.role === 'parent')  renderParentDash();
      else                              renderAdminDash();

    } catch (err) {
      console.error('Ошибка инициализации:', err);
      main.innerHTML = `<div class="card"><p style="color:red">Деректерді жүктеу қатесі: ${err.message}</p></div>`;
    }
  });

  // ─── STUDENT ──────────────────────────────────────────
  function renderStudentDash() {
    const student = LYCEUM_DATA.students.find(s => s.id === user.id) || LYCEUM_DATA.students[0];
    const subjects = student.bilimClass ? Object.keys(student.bilimClass) : [];
    const avgVals  = subjects.map(sub => subjectAvg(student.bilimClass)[sub] || 0);
    const overall  = student.bilimClass ? overallAvg(student.bilimClass) : '--';
    const avgs     = student.bilimClass ? subjectAvg(student.bilimClass) : {};

    main.innerHTML = `
      <div style="margin-bottom:24px;">
        <h1 style="margin-bottom:6px;">Оқушы панелі</h1>
        <div style="color:var(--gray);font-size:14px;">${student.fullname} · ${student.grade}</div>
      </div>

      <div class="quick-stats">
        <div class="stat-card"><div class="stat-icon purple">📊</div><div><div class="stat-num">${overall}</div><div class="stat-label">Орта балл</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">🏆</div><div><div class="stat-num">${student.achievements?.length||0}</div><div class="stat-label">Жетістіктер</div></div></div>
        <div class="stat-card"><div class="stat-icon green">🥇</div><div><div class="stat-num">#${student.rank||'—'}</div><div class="stat-label">Рейтинг</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">${riskBadge(student.riskLevel)}</div><div><div class="stat-num" style="font-size:14px">${student.riskLevel||'—'}</div><div class="stat-label">Тәуекел</div></div></div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Пәндер үлгерімі</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Пән</th><th>Орта балл</th><th>Бағалар</th><th>Үрдіс</th></tr></thead>
              <tbody>
                ${Object.entries(avgs).map(([sub, avg]) => `
                  <tr>
                    <td><strong>${sub}</strong></td>
                    <td><div class="grade-cell ${gradeColor(avg)}">${avg}</div></td>
                    <td style="font-size:12px;color:var(--gray)">${(student.bilimClass[sub]||[]).join(', ')}</td>
                    <td>${trendArrow(student.bilimClass[sub]||[])}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom:16px">Мақсаттар</h3>
          <div id="goalsList"></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
  <div class="card">
    <h3 style="margin-bottom:16px">Диаграмма</h3>
    <div style="position:relative; width:100%; height:280px;">
      <canvas id="subjectsChart"></canvas>
    </div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:16px">Радар</h3>
    <div style="position:relative; width:100%; height:280px;">
      <canvas id="radarChart"></canvas>
    </div>
  </div>
</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Жетістіктер</h3>
          <div id="achList"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Іс-шаралар</h3>
          <div id="eventsPreview"></div>
        </div>
      </div>
    `;

    // Графиктер — DOM дайын болғаннан кейін
    setTimeout(() => {
      const subChart = document.getElementById('subjectsChart');
      const radChart = document.getElementById('radarChart');
      if (subChart) barChart(subChart, subjects, avgVals);
      if (radChart) radarChart(radChart, subjects, avgVals);
    }, 50);

    // Мақсаттар
    const goalsList = document.getElementById('goalsList');
    if (goalsList) {
      (student.goals || []).forEach(g => {
        goalsList.innerHTML += `<div class="goal-item"><div class="goal-icon">🎯</div><div class="goal-text">${g}</div></div>`;
      });
      if (!student.goals?.length) goalsList.innerHTML = '<div class="text-gray text-sm">Мақсаттар қосылмаған</div>';
    }

    // Жетістіктер
    const achList = document.getElementById('achList');
    if (achList) {
      (student.achievements || []).slice(0, 3).forEach(a => {
        achList.innerHTML += `
          <div class="ach-badge-card">
            <div class="ach-emoji">${a.icon}</div>
            <div class="ach-info"><strong>${a.title}</strong><span>${a.place}-орын · ${a.year}</span></div>
          </div>`;
      });
      if (!student.achievements?.length) achList.innerHTML = '<div class="text-gray text-sm">Жетістіктер жоқ</div>';
    }

    // Іс-шаралар
    const evPrev = document.getElementById('eventsPreview');
    if (evPrev) {
      LYCEUM_DATA.events.slice(0, 3).forEach(ev => {
        evPrev.innerHTML += renderEventCard(ev);
      });
    }
  }

  // ─── TEACHER ──────────────────────────────────────────
  function renderTeacherDash() {
    const teacher = LYCEUM_DATA.teachers.find(t => t.id === user.id) || user;
    const allStudents = LYCEUM_DATA.students;
    const riskStudents = allStudents.filter(s => s.riskLevel !== 'low');
    const classAvg = (allStudents.reduce((sum, s) => {
      return sum + parseFloat(s.bilimClass ? overallAvg(s.bilimClass) : 0);
    }, 0) / allStudents.length).toFixed(1);

    main.innerHTML = `
      <div style="margin-bottom:24px;">
        <h1 style="margin-bottom:6px;">Мұғалім панелі</h1>
        <div style="color:var(--gray);font-size:14px;">${teacher.subject || ''} · ${teacher.grade || ''}</div>
      </div>

      <div class="quick-stats">
        <div class="stat-card"><div class="stat-icon purple">👥</div><div><div class="stat-num">${allStudents.length}</div><div class="stat-label">Оқушылар</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">📊</div><div><div class="stat-num">${classAvg}</div><div class="stat-label">Сынып GPA</div></div></div>
        <div class="stat-card"><div class="stat-icon red">⚠️</div><div><div class="stat-num">${riskStudents.length}</div><div class="stat-label">Тәуекел аймағы</div></div></div>
        <div class="stat-card"><div class="stat-icon green">🏆</div><div><div class="stat-num">${allStudents.reduce((a,s)=>a+(s.achievements?.length||0),0)}</div><div class="stat-label">Жетістіктер</div></div></div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Оқушылар үлгерімі</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Оқушы</th><th>Сынып</th><th>GPA</th><th>Тәуекел</th><th>Жетістіктер</th></tr></thead>
              <tbody>
                ${allStudents.map(s => `
                  <tr>
                    <td><div style="display:flex;align-items:center;gap:8px;">
                      <div class="avatar" style="width:28px;height:28px;font-size:10px">${initials(s.fullname)}</div>
                      <span style="font-weight:600">${s.fullname}</span>
                    </div></td>
                    <td><span class="badge badge-purple">${s.grade}</span></td>
                    <td><strong style="color:var(--p1)">${s.bilimClass ? overallAvg(s.bilimClass) : '—'}</strong></td>
                    <td>${riskBadge(s.riskLevel)}</td>
                    <td>${s.achievements?.length || 0} жетістік</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">🔴 Тәуекел аймағы</h3>
          ${riskStudents.map(s => `
            <div class="risk-student-row">
              <div class="avatar" style="width:32px;height:32px;font-size:11px">${initials(s.fullname)}</div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:13px">${s.fullname}</div>
                <div style="font-size:11px;color:var(--gray)">${s.grade} · GPA ${s.bilimClass ? overallAvg(s.bilimClass) : '—'}</div>
              </div>
              ${riskBadge(s.riskLevel)}
            </div>
          `).join('')}
          ${!riskStudents.length ? '<div class="text-gray text-sm">Тәуекел аймағында оқушы жоқ ✓</div>' : ''}
          <a href="risk-zone.html" class="btn btn-outline btn-sm w-full" style="margin-top:16px">Толық →</a>
        </div>
      </div>

      <div style="margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Жақын іс-шаралар</h3>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
            ${LYCEUM_DATA.events.slice(0,3).map(renderEventCard).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // ─── PARENT ──────────────────────────────────────────
  function renderParentDash() {
    const parent = LYCEUM_DATA.parents.find(p => p.id === user.id) || user;
    const child  = LYCEUM_DATA.students.find(s => s.id === parent.childId) || LYCEUM_DATA.students[0];
    const overall = child.bilimClass ? overallAvg(child.bilimClass) : '--';
    const avgs    = child.bilimClass ? subjectAvg(child.bilimClass) : {};

    main.innerHTML = `
      <div style="margin-bottom:24px;">
        <h1 style="margin-bottom:6px;">Ата-ана панелі</h1>
        <div style="color:var(--gray);font-size:14px;">Баланыз: ${child.fullname}</div>
      </div>

      <div style="background:linear-gradient(135deg,var(--p1),var(--p3));border-radius:var(--radius);padding:24px;margin-bottom:20px;color:#fff;">
        <div style="display:flex;align-items:center;gap:20px;">
          <div class="avatar avatar-xl" style="background:rgba(255,255,255,0.2);font-size:28px">${initials(child.fullname)}</div>
          <div>
            <h2 style="color:#fff;margin-bottom:4px">${child.fullname}</h2>
            <div style="color:rgba(255,255,255,0.7)">${child.grade} · Рейтинг #${child.rank}</div>
            <div style="margin-top:10px;display:flex;gap:12px;">
              <span class="badge" style="background:rgba(255,255,255,0.15);color:#fff">GPA ${overall}</span>
              <span class="badge" style="background:rgba(255,255,255,0.15);color:#fff">🏆 ${child.achievements?.length||0} жетістік</span>
              ${riskBadge(child.riskLevel)}
            </div>
          </div>
        </div>
      </div>

      <div class="quick-stats">
        <div class="stat-card"><div class="stat-icon purple">📊</div><div><div class="stat-num">${overall}</div><div class="stat-label">Орта балл</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">🏆</div><div><div class="stat-num">${child.achievements?.length||0}</div><div class="stat-label">Жетістіктер</div></div></div>
        <div class="stat-card"><div class="stat-icon green">🥇</div><div><div class="stat-num">#${child.rank}</div><div class="stat-label">Рейтинг</div></div></div>
        <div class="stat-card"><div class="stat-icon blue">📅</div><div><div class="stat-num">${child.events?.length||0}</div><div class="stat-label">Іс-шара</div></div></div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Пәндер үлгерімі</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Пән</th><th>Орташа балл</th><th>Бағалар</th><th>Үрдіс</th></tr></thead>
              <tbody>
                ${Object.entries(avgs).map(([sub, avg]) => `
                  <tr>
                    <td><strong>${sub}</strong></td>
                    <td><div class="grade-cell ${gradeColor(avg)}">${avg}</div></td>
                    <td style="font-size:12px;color:var(--gray)">${(child.bilimClass[sub]||[]).join(', ')}</td>
                    <td>${trendArrow(child.bilimClass[sub]||[])}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Жетістіктер</h3>
          ${(child.achievements||[]).map(a => `
            <div class="ach-badge-card" style="margin-bottom:8px">
              <div class="ach-emoji">${a.icon}</div>
              <div class="ach-info"><strong>${a.title}</strong><span>${a.place}-орын · ${a.year}</span></div>
            </div>
          `).join('') || '<div class="text-gray text-sm">Жетістіктер жоқ</div>'}
        </div>
      </div>
    `;
  }

  // ─── ADMIN ──────────────────────────────────────────
  function renderAdminDash() {
    const allStudents = LYCEUM_DATA.students;
    const totalAch  = allStudents.reduce((a,s)=>a+(s.achievements?.length||0),0);
    const riskCount = allStudents.filter(s=>s.riskLevel==='high').length;
    const avgGPA    = (allStudents.reduce((a,s)=>a+parseFloat(s.bilimClass?overallAvg(s.bilimClass):0),0)/allStudents.length).toFixed(1);

    main.innerHTML = `
      <div style="margin-bottom:24px;">
        <h1>Администратор панелі</h1>
        <div style="color:var(--gray);font-size:14px;">${user.fullname}</div>
      </div>

      <div class="quick-stats">
        <div class="stat-card"><div class="stat-icon purple">👥</div><div><div class="stat-num">${allStudents.length}</div><div class="stat-label">Барлық оқушы</div></div></div>
        <div class="stat-card"><div class="stat-icon gold">📊</div><div><div class="stat-num">${avgGPA}</div><div class="stat-label">Мектеп GPA</div></div></div>
        <div class="stat-card"><div class="stat-icon green">🏆</div><div><div class="stat-num">${totalAch}</div><div class="stat-label">Жетістіктер</div></div></div>
        <div class="stat-card"><div class="stat-icon red">⚠️</div><div><div class="stat-num">${riskCount}</div><div class="stat-label">Тәуекел</div></div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Рейтинг (Топ-5)</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Орын</th><th>Аты-жөні</th><th>GPA</th></tr></thead>
              <tbody>
                ${LYCEUM_DATA.leaderboard.slice(0,5).map(e=>`
                  <tr><td>${e.badge}</td><td>${e.name}</td><td><strong>${e.gpa}</strong></td></tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          <a href="ranking.html" class="btn btn-outline btn-sm w-full" style="margin-top:12px">Толық рейтинг →</a>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Жаңалықтар</h3>
          ${LYCEUM_DATA.news.slice(0,3).map(n=>`
            <div style="padding:12px 0;border-bottom:1px solid var(--border)">
              <div style="font-weight:600;font-size:13px;margin-bottom:2px">${n.title}</div>
              <div style="font-size:12px;color:var(--gray)">${formatDateRu(n.date)}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div style="margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Іс-шаралар</h3>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
            ${LYCEUM_DATA.events.slice(0,3).map(renderEventCard).join('')}
          </div>
          <a href="events.html" class="btn btn-outline btn-sm" style="margin-top:16px">Барлық іс-шаралар →</a>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
