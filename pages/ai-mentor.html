<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI ментор - Aqbobek Lyceum</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" class="btn btn-ghost btn-sm" id="mobileMenuBtn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
      <div class="topbar-title" id="topbarTitleEl">AI Ментор</div>
      <div class="topbar-actions">
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </div>
    <div class="page-content">
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;">
        <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
          <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--p1),var(--p3));">
            <div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            </div>
            <div>
              <div style="font-weight:700;color:#fff;font-size:15px;">AI Ментор</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.7);">Ақбөбек лицейінің жеке ментор жүйесі</div>
            </div>
            <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
              <div style="width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite"></div>
              <span style="font-size:12px;color:rgba(255,255,255,0.7)">Онлайн</span>
            </div>
          </div>
          <div id="chatMessages" class="ai-messages" style="min-height:360px;max-height:360px;"></div>
          <div class="ai-input-row">
            <input type="text" class="ai-input" id="chatInput"
              placeholder="Сұрағыңызды жазыңыз..."
              maxlength="500">
            <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div class="card">
            <h3 style="margin-bottom:12px;display:flex;align-items:center;gap:8px;" id="quickTitle">Жылдам сұрақтар</h3>
            <div style="display:flex;flex-direction:column;gap:6px;" id="quickQuestions"></div>
          </div>
          <div class="card">
            <h3 style="margin-bottom:12px;display:flex;align-items:center;gap:8px;" id="insightTitle">Менің үлгерімім</h3>
            <div id="insightContent"></div>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px;">
        <div class="card" style="background:#f0fdf4;border-color:#bbf7d0;">
          <div style="margin-bottom:8px;color:var(--green);" id="strongIcon"></div>
          <div style="font-weight:700;margin-bottom:4px">Күшті жақтарым</div>
          <div id="strongSubjects" style="font-size:13px;color:#15803d;"></div>
        </div>
        <div class="card" style="background:#fefce8;border-color:#fde68a;">
          <div style="margin-bottom:8px;color:var(--gold);" id="weakIcon"></div>
          <div style="font-weight:700;margin-bottom:4px">Жетілдіру керек</div>
          <div id="weakSubjects" style="font-size:13px;color:#a16207;"></div>
        </div>
        <div class="card" style="background:#eff6ff;border-color:#93c5fd;">
          <div style="margin-bottom:8px;color:var(--blue);" id="careerIcon"></div>
          <div style="font-weight:700;margin-bottom:4px">Мансап бағыты</div>
          <div id="careerSuggestion" style="font-size:13px;color:#1d4ed8;"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../json/decoder.js"></script>
<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
const WEBHOOK_AI_URL = 'https://asicapital.asia/webhook/123ed4d4-2837-49a4-b35d-92d57dce41ad';
let student = null;
let gpa = null;
let strong = [];
let weak = [];
(async () => {
  await initData();
  const user = Auth.require();
  buildSidebar('ai', user.role);
  document.getElementById('topbarAvatar').textContent = initials(user.fullname || user.login);
  document.getElementById('topbarTitleEl').innerHTML = ICONS.bot + ' AI Ментор';
  document.getElementById('quickTitle').innerHTML = ICONS.lightbulb + ' Жылдам сұрақтар';
  document.getElementById('insightTitle').innerHTML = ICONS.barChart + ' Менің үлгерімім';
  document.getElementById('strongIcon').innerHTML = ICONS.trendingUp;
  document.getElementById('weakIcon').innerHTML = ICONS.target;
  document.getElementById('careerIcon').innerHTML = ICONS.rocket;
  student = LYCEUM_DATA.students.find(s => s.id === user.id) || LYCEUM_DATA.students[0];
  const avgs = student?.bilimClass ? subjectAvg(student.bilimClass) : {};
  const subjects = Object.keys(avgs).sort((a,b)=>avgs[b]-avgs[a]);
  strong = subjects.slice(0,3);
  weak = subjects.slice(-3).reverse();
  gpa = student?.bilimClass ? overallAvg(student.bilimClass) : null;
  document.getElementById('strongSubjects').innerHTML =
    strong.map(s=>`<div style="display:flex;align-items:center;gap:6px;">${ICONS.check} ${s} (${avgs[s]})</div>`).join('');
  document.getElementById('weakSubjects').innerHTML =
    weak.map(s=>`<div style="display:flex;align-items:center;gap:6px;">${ICONS.arrowRight} ${s} (${avgs[s]})</div>`).join('');
  const careerMap = {
    'Математика': 'Математик, Деректер ғалымы',
    'Информатика': 'Бағдарламашы, AI инженері',
    'Физика': 'Физик, Инженер',
    'Биология': 'Дәрігер, Биотехнолог',
    'Химия': 'Химик, Фармацевт',
    'Ағылшын тілі': 'Аудармашы, Халықаралық қатынастар',
  };
  document.getElementById('careerSuggestion').textContent =
    careerMap[strong[0]] || 'IT & Технология';
  const quick = document.getElementById('quickQuestions');
  [
    'Математикамды қалай жақсарта аламын?',
    'Мансаптық бағытым туралы кеңес беріңіз',
    'ЕНТ-ге дайындалу жоспарым?',
    'Информатика үйрену жолдары?',
    'Менің нәтижелерімді талдаңыз'
  ].forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline btn-sm w-full';
    btn.style.cssText = 'text-align:left;justify-content:flex-start;';
    btn.textContent = q;
    btn.onclick = () => {
      document.getElementById('chatInput').value = q;
      sendMessage();
    };
    quick.appendChild(btn);
  });
  document.getElementById('insightContent').innerHTML = `
    <div style="margin-bottom:8px;font-size:13px;color:var(--gray)">Жалпы орта балл</div>
    <div style="font-size:28px;color:var(--p1);margin-bottom:12px;font-weight:800;">${gpa || '--'}</div>
    <div class="progress-bar" style="margin-bottom:16px">
      <div class="progress-fill" style="width:${gpa ? (gpa/5*100)+'%' : '0'}"></div>
    </div>
    <div style="font-size:12px;color:var(--gray)">
      Рейтинг: <strong style="color:var(--p1)">#${student?.rank || '-'}</strong>
    </div>
  `;
})();
const messagesDiv = document.getElementById('chatMessages');
const input = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  div.innerHTML = `<div class="ai-bubble">${text}</div>`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
function showTyping() {
  const div = document.createElement('div');
  div.className = 'ai-msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="ai-typing"><span></span><span></span><span></span></div>`;
  messagesDiv.appendChild(div);
}
function removeTyping() {
  document.getElementById('typingIndicator')?.remove();
}
addMessage("Сәлем! Мен AI ментормын. Сұрағыңызды жазыңыз.", 'bot');
async function sendMessage() {
  if (!student) {
    addMessage("Деректер жүктелуде...", 'bot');
    return;
  }
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;
  addMessage(text, 'user');
  showTyping();
  try {
    const response = await fetch(WEBHOOK_AI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        student: {
          name: student.fullname,
          grade: student.grade,
          gpa: gpa,
          strong_subjects: strong,
          weak_subjects: weak,
          achievements_count: student?.achievements?.length || 0
        }
      })
    });
    const data = await response.json();
    let reply = data.output || data.response || data.text || "Жауап жоқ";
    reply = reply.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
    removeTyping();
    addMessage(reply, 'bot');
  } catch (e) {
    console.error(e);
    removeTyping();
    addMessage("Қате: серверге қосыла алмады", 'bot');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
