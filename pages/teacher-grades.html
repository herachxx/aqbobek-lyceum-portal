<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сынып бағалары - Aqbobek Lyceum</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" class="btn btn-ghost btn-sm" id="mobileMenuBtn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
      <div class="topbar-title" id="topbarTitleEl">Сынып бағалары</div>
      <div class="topbar-actions">
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </div>
    <div class="page-content">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;padding:14px 18px;background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-radius:var(--radius);border:1px solid #93c5fd;">
        <span style="color:var(--blue);display:flex;" id="bilimIcon"></span>
        <div>
          <div style="font-weight:700;font-size:14px;color:#1e40af">BilimClass - Мұғалім панелі</div>
          <div style="font-size:12px;color:#3b82f6">Барлық сынып оқушыларының бағалары · Тәуекел мониторингі</div>
        </div>
        <select id="subjectFilter" style="margin-left:auto;border:1px solid #93c5fd;border-radius:6px;padding:6px 10px;font-family:var(--font);font-size:13px;background:#fff;" onchange="renderTable()">
          <option value="all">Барлық пәндер</option>
        </select>
      </div>
      <div class="quick-stats" id="classStats"></div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <div class="section-header">
            <h3>Оқушылар үлгерімі</h3>
            <input id="searchInput" placeholder="Іздеу..." class="btn btn-ghost btn-sm" style="border:1px solid var(--border);padding:6px 12px;border-radius:6px;font-family:var(--font)" oninput="renderTable()">
          </div>
          <div class="table-wrap" style="max-height: 540px; overflow-y: auto; box-shadow: none; border-radius: 0; border: none;">
            <table style="position: relative;">
              <thead style="position: sticky; top: 0; z-index: 10; background: var(--cream); box-shadow: 0 1px 0 var(--border);">
                <tr>
                  <th>Оқушы</th>
                  <th>Сынып</th>
                  <th id="subjectHeader">Пән орта</th>
                  <th>GPA</th>
                  <th>Тәуекел</th>
                  <th>Үрдіс</th>
                </tr>
              </thead>
              <tbody id="classBody"></tbody>
            </table>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div class="card">
            <h3 style="margin-bottom:12px">Сынып пәндер орта баллы</h3>
            <div style="height:220px"><canvas id="classSubjectsChart"></canvas></div>
          </div>
          <div class="card">
            <h3 style="margin-bottom:12px">Тәуекел бөлуі</h3>
            <div style="height:150px"><canvas id="riskChart"></canvas></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../json/decoder.js"></script>
<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    await initData();
    const user = Auth.require(['teacher','admin']);
    buildSidebar('grades', user.role);
    document.getElementById('topbarAvatar').textContent = initials(user.fullname || user.login);
    document.getElementById('topbarTitleEl').innerHTML = ICONS.clipboard + ' Сынып бағалары';
    document.getElementById('bilimIcon').innerHTML = ICONS.link;
    const students = LYCEUM_DATA.students;
    const subjects = LYCEUM_DATA.subjects;
    const sf = document.getElementById('subjectFilter');
    subjects.forEach(s => { sf.innerHTML += `<option value="${s}">${s}</option>`; });
    const classGpas = students.map(s => s.bilimClass ? parseFloat(overallAvg(s.bilimClass)) : 0);
    const classAvgGpa = (classGpas.reduce((a,b)=>a+b,0)/classGpas.length).toFixed(1);
    document.getElementById('classStats').innerHTML = `
      <div class="stat-card"><div class="stat-icon purple">${ICONS.users}</div><div><div class="stat-num">${students.length}</div><div class="stat-label">Оқушылар</div></div></div>
      <div class="stat-card"><div class="stat-icon gold">${ICONS.barChart}</div><div><div class="stat-num">${classAvgGpa}</div><div class="stat-label">Сынып GPA</div></div></div>
      <div class="stat-card"><div class="stat-icon red">${ICONS.alertTriangle}</div><div><div class="stat-num">${students.filter(s=>s.riskLevel==='high').length}</div><div class="stat-label">Жоғары тәуекел</div></div></div>
      <div class="stat-card"><div class="stat-icon green">${ICONS.trophy}</div><div><div class="stat-num">${students.reduce((a,s)=>a+(s.achievements?.length||0),0)}</div><div class="stat-label">Жетістіктер</div></div></div>
    `;
    window.renderTable = function() {
      const subj = sf.value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      document.getElementById('subjectHeader').textContent = subj === 'all' ? 'GPA' : subj;
      const filtered = students.filter(s => s.fullname.toLowerCase().includes(search));
      const tbody = document.getElementById('classBody');
      tbody.innerHTML = filtered.map(s => {
        const avgs = s.bilimClass ? subjectAvg(s.bilimClass) : {};
        const gpa = s.bilimClass ? overallAvg(s.bilimClass) : '-';
        const subjAvg = subj !== 'all' && avgs[subj] ? avgs[subj] : null;
        const displayVal = subj === 'all' ? gpa : (subjAvg ?? '-');
        const trend = subj !== 'all' && s.bilimClass?.[subj] ? trendArrow(s.bilimClass[subj]) : '';
        return `
          <tr>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:10px">${initials(s.fullname)}</div><strong>${s.fullname}</strong></div></td>
            <td><span class="badge badge-purple">${s.grade}</span></td>
            <td><div class="grade-cell ${gradeColor(parseFloat(displayVal))}">${displayVal}</div></td>
            <td><strong style="color:var(--p1)">${gpa}</strong></td>
            <td>${riskBadge(s.riskLevel)}</td>
            <td>${trend}</td>
          </tr>
        `;
      }).join('');
    };
    sf.addEventListener('change', renderTable);
    document.getElementById('searchInput').addEventListener('input', renderTable);
    renderTable();
    setTimeout(() => {
      const subjectAvgs = subjects.map(sub => {
        const vals = students.filter(s => s.bilimClass?.[sub]).map(s => avg(s.bilimClass[sub]));
        return Math.round(vals.reduce((a,b)=>a+b,0)/(vals.length||1));
      });
      barChart(document.getElementById('classSubjectsChart'), subjects.map(s => s.length > 8 ? s.slice(0,8)+'...' : s), subjectAvgs);
      const high = students.filter(s=>s.riskLevel==='high').length;
      const medium = students.filter(s=>s.riskLevel==='medium').length;
      const low = students.filter(s=>s.riskLevel==='low').length;
      new Chart(document.getElementById('riskChart').getContext('2d'), {
        type: 'doughnut',
        data: { labels: ['Жоғары','Орташа','Норма'], datasets:[{data:[high,medium,low],backgroundColor:['#ef4444','#f59e0b','#10b981'],borderWidth:0}] },
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{font:{size:11}} } } }
      });
    }, 50);
  } catch(err) {
    console.error('Page init error:', err);
    toast('Деректерді жүктеу мүмкін болмады', 'error');
  }
});
</script>
</body>
</html>
