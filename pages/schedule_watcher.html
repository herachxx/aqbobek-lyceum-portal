<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё расписание — Ақбөбек Portal</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .schedule-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .schedule-head {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--p1), var(--p3));
    }
    .schedule-head h2 { font-size: 15px; font-weight: 700; color: #fff; }
    .stag {
      padding: 3px 10px; border-radius: 999px; font-size: 11px;
      font-weight: 700; letter-spacing: .04em;
    }
    .stag-blue   { background: rgba(255,255,255,.18); color: #fff; }
    .stag-purple { background: rgba(255,255,255,.12); color: rgba(255,255,255,.85); }

    .day-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .day-tab {
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 13px; font-weight: 600;
      cursor: pointer; background: var(--cream);
      color: var(--dark); transition: all .15s;
    }
    .day-tab:hover { border-color: var(--p1); color: var(--p1); }
    .day-tab.active { background: var(--p1); border-color: var(--p1); color: #fff; }
    .day-tab.today-tab { border-color: var(--p3); }
    .day-tab.today-tab:not(.active) { color: var(--p1); }

    .lessons-grid { display: flex; flex-direction: column; }
    .lesson-row {
      display: grid;
      grid-template-columns: 52px 1fr 110px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-row:hover { background: rgba(124,58,237,.04); }
    .lesson-row.empty-lesson { opacity: .45; }

    .lesson-num {
      display: flex; align-items: center; justify-content: center;
      height: 100%; width: 52px;
      font-size: 12px; font-weight: 700; color: var(--gray);
      border-right: 1px solid var(--border);
      background: rgba(0,0,0,.02);
    }
    .lesson-num span {
      width: 26px; height: 26px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--border); font-size: 11px;
    }
    .lesson-name-wrap { padding: 12px 16px; }
    .lesson-name { font-size: 14px; color: var(--dark); font-weight: 500; }
    .lesson-name.empty { color: var(--gray); font-style: italic; font-weight: 400; }
    .lesson-time {
      padding: 0 12px; font-size: 11px; color: var(--gray);
      white-space: nowrap; font-family: monospace;
    }

    .schedule-wrapper { position: relative; }
    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,.7);
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius); z-index: 10;
      pointer-events: none; opacity: 0; transition: opacity .25s;
    }
    .loading-overlay.visible { opacity: 1; pointer-events: all; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--p1);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
      padding: 60px 24px; color: var(--gray); text-align: center;
    }
    .empty-state span { font-size: 36px; }
    .empty-state p { font-size: 14px; }

    .info-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 18px;
      background: var(--cream); border: 1px solid var(--border);
      border-radius: var(--radius); margin-top: 16px;
      font-size: 12px; color: var(--gray);
    }
    .info-bar strong { color: var(--dark); }

    /* Banner shown only for parents */
    .child-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      background: rgba(124,58,237,.07);
      border: 1px solid rgba(124,58,237,.2);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 13px; color: var(--dark);
    }
    .child-banner .icon { font-size: 18px; }
    .child-banner strong { color: var(--p1); }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">📅 Моё расписание</div>
      <div class="topbar-actions">
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </div>

    <div class="page-content">

      <!-- Parent: child info banner -->
      <div class="child-banner" id="childBanner" style="display:none;">
        <span class="icon">👦</span>
        <div>Расписание ребёнка: <strong id="childName">—</strong> &nbsp;·&nbsp; Класс: <strong id="childGrade">—</strong></div>
      </div>

      <!-- Day tabs -->
      <div class="day-tabs" id="dayTabs"></div>

      <!-- Schedule card -->
      <div class="schedule-wrapper">
        <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
        <div class="schedule-card" id="scheduleCard">
          <div class="schedule-head">
            <span style="font-size:20px;">📋</span>
            <h2>Расписание уроков</h2>
            <span class="stag stag-blue" id="tagClass">—</span>
            <span class="stag stag-purple" id="tagDay">—</span>
          </div>
          <div class="lessons-grid" id="lessonsGrid">
            <div class="empty-state">
              <span>📚</span>
              <p>Выберите день недели выше</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Info bar -->
      <div class="info-bar" id="infoBar" style="display:none;">
        📌 Расписание для класса <strong id="infoClass">—</strong> · обновлено из базы данных
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../json/decoder.js"></script>
<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
// ── Auth: student OR parent ───────────────────────────────────
const user = Auth.require(['student', 'parent']);
buildSidebar('schedule', user.role);
document.getElementById('topbarAvatar').textContent = initials(user.fullname || user.login);

// ── Constants ─────────────────────────────────────────────────
const LESSON_TIMES = [
  '08:00–08:45','08:55–09:40','09:50–10:35',
  '10:55–11:40','11:50–12:35','12:45–13:30',
  '13:40–14:25','14:35–15:20','15:30–16:15','16:25–17:10'
];
const FIELD_KEYS = [
  'first_subject','second_subject','third_subject','fourth_subject',
  'fifth_subject','sixth_subject','seventh_subject','eigthth_subject',
  'nineth_subject','tenth_subject'
];
const DAYS = [
  { key: 'monday',    label: 'Пн', full: 'Понедельник' },
  { key: 'tuesday',  label: 'Вт', full: 'Вторник'     },
  { key: 'wednesday',label: 'Ср', full: 'Среда'        },
  { key: 'thursday', label: 'Чт', full: 'Четверг'      },
  { key: 'friday',   label: 'Пт', full: 'Пятница'      },
];

const SCHEDULE_WEBHOOK = 'https://asicapital.asia/webhook/bcc9850d-887b-42fe-8ce0-1b647f3866fc';

// ── Grade helpers ─────────────────────────────────────────────
function normalizeGrade(grade) {
  if (!grade) return '';
  const map = {
    'А':'a','A':'a','а':'a',
    'Б':'b','B':'b','б':'b',
    'В':'c','C':'c','в':'c',
    'Г':'d','D':'d','г':'d'
  };
  return grade.replace(/[А-ЯA-Za-zа-я]/g, ch => map[ch] || ch.toLowerCase()).toLowerCase();
}

let studentClass = '';  // normalized, e.g. "10a"
let displayGrade  = ''; // raw display, e.g. "10А"

// ── Resolve grade depending on role ──────────────────────────
if (user.role === 'student') {
  studentClass = normalizeGrade(user.grade);
  displayGrade  = user.grade || '—';
  initPage();
} else if (user.role === 'parent') {
  // LYCEUM_DATA may not be ready yet — wait for it
  function tryResolveChild() {
    const data = window.LYCEUM_DATA;
    if (!data) return false;
    const child = data.students.find(s => s.id === user.childId);
    if (child) {
      studentClass = normalizeGrade(child.grade);
      displayGrade  = child.grade || '—';
      // Show child banner
      document.getElementById('childBanner').style.display = 'flex';
      document.getElementById('childName').textContent   = child.fullname || '—';
      document.getElementById('childGrade').textContent  = displayGrade.toUpperCase();
    } else {
      toast('Ребёнок не найден (childId: ' + user.childId + ')', 'error');
    }
    initPage();
    return true;
  }

  if (!tryResolveChild()) {
    // Poll until LYCEUM_DATA is available (data.js loads it async)
    const interval = setInterval(() => {
      if (tryResolveChild()) clearInterval(interval);
    }, 100);
  }
}

// ── Init tabs + auto-select today ────────────────────────────
function initPage() {
  document.getElementById('tagClass').textContent  = displayGrade.toUpperCase();
  document.getElementById('infoClass').textContent = displayGrade.toUpperCase();

  buildTabs();
  const todayKey  = getTodayKey();
  const todayFull = DAYS.find(d => d.key === todayKey)?.full || 'Понедельник';
  selectDay(todayKey, todayFull);
}

// ── Today detection ───────────────────────────────────────────
function getTodayKey() {
  const map = [null,'monday','tuesday','wednesday','thursday','friday','saturday'];
  return map[new Date().getDay()] || 'monday';
}

// ── Build day tabs ────────────────────────────────────────────
function buildTabs() {
  const todayKey = getTodayKey();
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d.key === todayKey ? ' today-tab' : '');
    btn.textContent = d.label + (d.key === todayKey ? ' ·сегодня' : '');
    btn.dataset.key  = d.key;
    btn.dataset.full = d.full;
    btn.addEventListener('click', () => selectDay(d.key, d.full));
    container.appendChild(btn);
  });
}

function selectDay(key, fullName) {
  document.querySelectorAll('.day-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.key === key)
  );
  loadSchedule(key, fullName);
}

// ── Load from webhook ─────────────────────────────────────────
async function loadSchedule(day, dayName) {
  if (!studentClass) { toast('Класс не определён', 'error'); return; }

  setLoading(true);
  try {
    const res = await fetch(SCHEDULE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get', class: studentClass, day })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data   = await res.json();
    const record = Array.isArray(data) ? data[0] : data;
    const lessons = FIELD_KEYS.map(k => (record && record[k]) ? record[k] : '');
    renderSchedule(dayName, lessons);
    document.getElementById('infoBar').style.display = 'flex';
  } catch(e) {
    toast('Ошибка загрузки: ' + e.message, 'error');
    renderSchedule(dayName, Array(10).fill(''));
  } finally {
    setLoading(false);
  }
}

// ── Render (read-only) ────────────────────────────────────────
function renderSchedule(dayName, lessons) {
  document.getElementById('tagDay').textContent = dayName;
  const grid = document.getElementById('lessonsGrid');
  grid.innerHTML = '';

  let lastFilled = -1;
  lessons.forEach((l, i) => { if (l.trim()) lastFilled = i; });

  if (lastFilled === -1) {
    grid.innerHTML = '<div class="empty-state"><span>🎉</span><p>Уроков в этот день нет</p></div>';
    return;
  }

  lessons.slice(0, lastFilled + 1).forEach((lesson, i) => {
    const isEmpty = !lesson.trim();
    const row = document.createElement('div');
    row.className = 'lesson-row' + (isEmpty ? ' empty-lesson' : '');
    row.innerHTML =
      '<div class="lesson-num"><span>' + (i + 1) + '</span></div>' +
      '<div class="lesson-name-wrap">' +
        '<div class="lesson-name' + (isEmpty ? ' empty' : '') + '">' +
          (isEmpty ? 'Нет урока' : escapeHtml(lesson)) +
        '</div>' +
      '</div>' +
      '<div class="lesson-time">' + LESSON_TIMES[i] + '</div>';
    grid.appendChild(row);
  });
}

// ── Helpers ───────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loadingOverlay').classList.toggle('visible', on);
}
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
