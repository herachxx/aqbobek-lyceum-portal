<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тәуекел аймағы - Aqbobek Lyceum</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <button onclick="toggleSidebar()" class="btn btn-ghost btn-sm" id="mobileMenuBtn" style="display:none"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
      <div class="topbar-title" id="topbarTitleEl">Тәуекел аймағы</div>
      <div class="topbar-actions">
        <div class="avatar" id="topbarAvatar"></div>
      </div>
    </div>
    <div class="page-content">
      <div style="padding:14px 18px;background:#fef2f2;border-radius:var(--radius);border:1px solid #fca5a5;margin-bottom:24px;display:flex;align-items:center;gap:10px;">
        <span style="color:var(--red);display:flex;" id="alertIcon"></span>
        <div>
          <div style="font-weight:700;font-size:14px;color:#991b1b">Тәуекел аймағы мониторингі</div>
          <div style="font-size:12px;color:#dc2626">Бұл бет мұғалімдер мен администраторларға арналған. Орта балы төмен немесе үрдісі нашарлаған оқушылар тізімі.</div>
        </div>
      </div>
      <div class="quick-stats" id="riskStats"></div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;">
        <div class="card">
          <h3 style="margin-bottom:16px">Тәуекел деңгейі бойынша оқушылар</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Оқушы</th><th>Сынып</th><th>GPA</th><th>Тәуекел</th><th>Проблемалы пән</th><th>Іс-әрекет</th></tr></thead>
              <tbody id="riskBody"></tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:16px">Тәуекел деңгейі бойынша бөлу</h3>
          <div style="height:200px"><canvas id="riskPieChart"></canvas></div>
        </div>
      </div>
      <div class="card" style="margin-top:20px;">
        <h3 style="margin-bottom:16px">Жалпы пәндер бойынша орташа балл</h3>
        <div style="height:200px"><canvas id="subjectsBarChart"></canvas></div>
      </div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="../json/decoder.js"></script>
<script src="../json/data.js"></script>
<script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    if (typeof initData === 'function') await initData();
    const user = Auth.require(['teacher','admin']);
    buildSidebar('risk', user.role);
    document.getElementById('topbarAvatar').textContent = initials(user.fullname || user.login);
    document.getElementById('topbarTitleEl').innerHTML = ICONS.alertTriangle + ' Тәуекел аймағы';
    document.getElementById('alertIcon').innerHTML = ICONS.circleAlert;
    const students = LYCEUM_DATA.students;
    const subjects = LYCEUM_DATA.subjects;
    const high = students.filter(s => s.riskLevel === 'high');
    const medium = students.filter(s => s.riskLevel === 'medium');
    const low = students.filter(s => s.riskLevel === 'low');
    document.getElementById('riskStats').innerHTML = `
      <div class="stat-card"><div class="stat-icon red">${ICONS.circleAlert}</div><div><div class="stat-num">${high.length}</div><div class="stat-label">Жоғары тәуекел</div></div></div>
      <div class="stat-card"><div class="stat-icon gold">${ICONS.circleDot}</div><div><div class="stat-num">${medium.length}</div><div class="stat-label">Орташа тәуекел</div></div></div>
      <div class="stat-card"><div class="stat-icon green">${ICONS.checkCircle}</div><div><div class="stat-num">${low.length}</div><div class="stat-label">Норма</div></div></div>
      <div class="stat-card"><div class="stat-icon purple">${ICONS.users}</div><div><div class="stat-num">${students.length}</div><div class="stat-label">Барлық оқушы</div></div></div>
    `;
    const tbody = document.getElementById('riskBody');
    const sorted = [...students].sort((a,b) => ({high:0, medium:1, low:2}[a.riskLevel] - {high:0, medium:1, low:2}[b.riskLevel]));
    sorted.forEach(s => {
      const avgs = s.bilimClass ? subjectAvg(s.bilimClass) : {};
      const worst = Object.keys(avgs).sort((a,b)=>avgs[a]-avgs[b])[0];
      tbody.innerHTML += `
        <tr>
          <td><div style="display:flex;align-items:center;gap:8px;"><div class="avatar" style="width:30px;height:30px;font-size:10px">${initials(s.fullname)}</div><strong>${s.fullname}</strong></div></td>
          <td><span class="badge badge-purple">${s.grade}</span></td>
          <td><strong style="color:var(--p1)">${s.bilimClass ? overallAvg(s.bilimClass) : '-'}</strong></td>
          <td>${riskBadge(s.riskLevel)}</td>
          <td>${worst ? `<span class="badge badge-red">${worst}: ${avgs[worst]}</span>` : '-'}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick="contactStudent('${s.fullname}')">Хабарлас</button>
          </td>
        </tr>
      `;
    });
    function contactStudent(name) {
      toast(`${name} оқушысына хабарлама жіберілді`, 'success');
    }
    setTimeout(() => {
      new Chart(document.getElementById('riskPieChart').getContext('2d'), {
        type:'doughnut',
        data:{
          labels:['Жоғары','Орташа','Норма'],
          datasets:[{data:[high.length,medium.length,low.length], backgroundColor:['#ef4444','#f59e0b','#10b981'], borderWidth:0}]
        },
        options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom', labels:{font:{size:11}}}}}
      });
      const subAvgs = subjects.map(sub => {
        const vals = students.filter(s => s.bilimClass?.[sub]).map(s=>avg(s.bilimClass[sub]));
        return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
      });
      barChart(document.getElementById('subjectsBarChart'), subjects, subAvgs);
    }, 50);
  } catch (err) {
    console.error('Risk zone error:', err);
    toast('Деректерді жүктеу мүмкін болмады', 'error');
  }
});
</script>
</body>
</html>
